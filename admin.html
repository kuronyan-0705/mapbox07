<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>国道演出 管理画面</title>
    <style>
      :root { color-scheme: dark; --panel: #182126; --line: #314047; --text: #f2f5f4; --muted: #a9b6b6; }
      * { box-sizing: border-box; }
      body { margin: 0; background: radial-gradient(circle at 18% 0%, #25323a 0, #10161a 42%, #090d10 100%); color: var(--text); font: 14px/1.6 system-ui, -apple-system, BlinkMacSystemFont, "Yu Gothic", Meiryo, sans-serif; }
      main { width: min(1180px, calc(100vw - 32px)); margin: 0 auto; padding: 28px 0 40px; }
      header { display: flex; justify-content: space-between; gap: 16px; align-items: end; margin-bottom: 20px; }
      h1 { margin: 0; font-size: clamp(24px, 3vw, 40px); line-height: 1.2; letter-spacing: 0; }
      p { margin: 6px 0 0; color: var(--muted); }
      .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px; }
      section { grid-column: span 6; background: rgba(24, 33, 38, .92); border: 1px solid var(--line); border-radius: 8px; padding: 18px; box-shadow: 0 20px 60px rgba(0,0,0,.28); }
      .wide { grid-column: 1 / -1; }
      h2 { margin: 0 0 14px; font-size: 16px; }
      h3 { margin: 0 0 10px; font-size: 14px; color: #f4dfd7; }
      label { display: grid; gap: 6px; margin: 0 0 12px; color: #dce4e2; font-weight: 700; }
      input { width: 100%; min-height: 40px; border: 1px solid #405158; border-radius: 6px; background: #0d1417; color: var(--text); padding: 8px 10px; font: inherit; }
      input[type="color"] { padding: 3px; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
      button, a.button { appearance: none; border: 1px solid #5a2b25; border-radius: 6px; background: linear-gradient(180deg, #ff4a2e, #be281c); color: white; min-height: 42px; padding: 9px 14px; font: 800 14px/1 system-ui, sans-serif; text-decoration: none; cursor: pointer; }
      button.secondary, a.secondary { background: #121a1f; border-color: #405158; color: #dce4e2; }
      button.capture { background: linear-gradient(180deg, #7ee3ff, #2477c4); border-color: #23628f; color: #03111c; }
      button.auto { background: linear-gradient(180deg, #a1ff9a, #2b9b4b); border-color: #23733d; color: #07150c; }
      button.small { min-height: 34px; padding: 7px 10px; font-size: 12px; }
      #message { color: #ffd9cf; min-height: 24px; }
      pre { margin: 0; padding: 14px; max-height: 280px; overflow: auto; border: 1px solid #34454c; border-radius: 6px; background: #0b1114; color: #cfe4e4; white-space: pre-wrap; }
      .candidate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
      .candidate-list { display: grid; gap: 10px; }
      .candidate { border: 1px solid #3b4c53; border-radius: 8px; padding: 12px; background: #10181c; }
      .candidate strong { display: block; color: #fff3ef; font-size: 14px; margin-bottom: 4px; }
      .candidate code { color: #bfe9ef; }
      .meta { color: #98abab; font-size: 12px; margin: 4px 0 10px; }
      .empty { border: 1px dashed #3b4c53; border-radius: 8px; padding: 12px; color: var(--muted); }
      @media (max-width: 760px) { section { grid-column: 1 / -1; } header { display: block; } .row, .candidate-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>国道演出 管理画面</h1>
          <p>国道番号から候補を取得し、起点・終点を確認してから撮影用ルートを生成します。</p>
        </div>
        <div class="actions">
          <a class="button secondary" href="./energy-3d.html" target="_blank" rel="noreferrer">現在の映像を開く</a>
          <a class="button secondary" href="./capture.html" target="_blank" rel="noreferrer">録画DLページ</a>
        </div>
      </header>

      <form id="form" class="grid">
        <section>
          <h2>国道データ</h2>
          <div class="row">
            <label>国道番号<input name="routeNumber" value="128"></label>
            <label>OSMリレーションID 空欄可<input name="relationId" value="9069158"></label>
          </div>
          <label>開始地点 lng,lat 空欄可<input name="start" value="140.12462,35.61059"></label>
          <label>終了地点 lng,lat 空欄可<input name="end" value="139.86315,34.99318"></label>
          <label>取得範囲 west,south,east,north 空欄可<input name="bounds" value="139.72,34.86,140.62,35.72"></label>
        </section>

        <section>
          <h2>タイトル</h2>
          <label>タイトル<input name="title" value="国道128号線のミステリー"></label>
          <label>小見出し<input name="kicker" value="Route 128 / OpenStreetMap"></label>
          <label>赤線カラー<input name="red" type="color" value="#ff1208"></label>
        </section>

        <section class="wide">
          <h2>起点・終点候補</h2>
          <div class="actions">
            <button type="button" id="endpointFetch" class="auto">起点・終点候補を取得</button>
            <button type="button" id="swapEndpoints" class="secondary">起点・終点を入れ替える</button>
          </div>
          <p id="endpointSummary">候補を取得すると、ここに開始地点・終了地点の候補が表示されます。</p>
          <div id="candidateArea" class="candidate-grid"></div>
        </section>

        <section>
          <h2>カメラ</h2>
          <div class="row"><label>開始ズーム<input name="introZoom" type="number" step="0.05" value="12.55"></label><label>追従ズーム<input name="followZoom" type="number" step="0.05" value="13.05"></label></div>
          <div class="row"><label>ピッチ<input name="pitch" type="number" step="1" value="74"></label><label>地形立体感<input name="terrain" type="number" step="0.05" value="2.05"></label></div>
          <div class="row"><label>追従時間 ms<input name="followDuration" type="number" step="100" value="8200"></label><label>俯瞰時間 ms<input name="outroDuration" type="number" step="100" value="6500"></label></div>
        </section>

        <section>
          <h2>構図と発光</h2>
          <label>初期中心 lng,lat<input name="mapCenter" value="140.22,35.31"></label>
          <label>ラスト俯瞰中心 lng,lat<input name="outroCenter" value="140.08,35.29"></label>
          <div class="row"><label>ラストズーム<input name="outroZoom" type="number" step="0.05" value="8.9"></label><label>灰色線の濃さ<input name="guideOpacity" type="number" step="0.05" value="0.72"></label></div>
          <div class="row"><label>赤線発光<input name="glowScale" type="number" step="0.05" value="1"></label><label>地形反射<input name="reflectionScale" type="number" step="0.05" value="1"></label></div>
        </section>

        <section class="wide">
          <div class="actions">
            <button type="button" id="auto" class="auto">確定した起終点でルート生成</button>
            <button type="button" id="save">保存</button>
            <button type="button" id="preview">保存してプレビュー</button>
            <button type="button" id="capture" class="capture">保存してブラウザ録画DL</button>
            <button type="button" id="test" class="secondary">OSM取得テスト</button>
            <button type="button" id="reset" class="secondary">128号に戻す</button>
          </div>
          <p id="message"></p>
        </section>

        <section class="wide"><h2>現在の設定</h2><pre id="output"></pre></section>
      </form>
    </main>

    <script>
      const STORAGE_KEY = 'routeDirectorPreset';
      const form = document.getElementById('form');
      const output = document.getElementById('output');
      const message = document.getElementById('message');
      const endpointSummary = document.getElementById('endpointSummary');
      const candidateArea = document.getElementById('candidateArea');
      const defaults = readForm();
      let endpointCandidates = null;
      loadSaved(); render();
      form.addEventListener('input', render);
      document.getElementById('save').addEventListener('click', () => { save(); message.textContent = '保存しました。energy-3d.htmlを開くとこの設定で再生されます。'; });
      document.getElementById('preview').addEventListener('click', () => { save(); window.open('./energy-3d.html', '_blank', 'noreferrer'); });
      document.getElementById('capture').addEventListener('click', () => { save(); window.open('./capture.html', '_blank', 'noreferrer'); });
      document.getElementById('reset').addEventListener('click', () => { localStorage.removeItem(STORAGE_KEY); writeForm(defaults); endpointCandidates = null; renderCandidates(); save(); message.textContent = '国道128号の基準設定に戻しました。'; });
      document.getElementById('test').addEventListener('click', () => testRoute(false));
      document.getElementById('auto').addEventListener('click', () => testRoute(true));
      document.getElementById('endpointFetch').addEventListener('click', fetchEndpointCandidates);
      document.getElementById('swapEndpoints').addEventListener('click', swapEndpoints);

      async function fetchEndpointCandidates() {
        const preset = readForm();
        if (!preset.routeNumber) { message.textContent = '国道番号を入力してください。'; return; }
        endpointSummary.textContent = `国道${preset.routeNumber}号の起点・終点候補を取得しています...`;
        candidateArea.innerHTML = '';
        try {
          const response = await fetch(`/api/route-endpoints?${new URLSearchParams({ routeNumber: preset.routeNumber })}`, { cache: 'no-store' });
          const data = await response.json();
          if (!response.ok) throw new Error(data.detail || data.error || `API ${response.status}`);
          endpointCandidates = data;
          if (data.relationId) form.elements.relationId.value = String(data.relationId);
          if (Array.isArray(data.bounds)) form.elements.bounds.value = data.bounds.join(',');
          form.elements.title.value = `国道${data.routeNumber}号線のミステリー`;
          form.elements.kicker.value = `Route ${data.routeNumber} / OpenStreetMap`;
          renderCandidates();
          save();
          endpointSummary.textContent = `国道${data.routeNumber}号の候補を取得しました。候補を確認して開始・終了に採用してください。`;
        } catch (error) {
          endpointSummary.textContent = `候補取得失敗: ${error.message}`;
        }
      }

      function renderCandidates() {
        if (!endpointCandidates) {
          candidateArea.innerHTML = '';
          endpointSummary.textContent = '候補を取得すると、ここに開始地点・終了地点の候補が表示されます。';
          return;
        }
        candidateArea.innerHTML = [candidateColumn('起点候補', 'start', endpointCandidates.start || []), candidateColumn('終点候補', 'end', endpointCandidates.end || [])].join('');
        candidateArea.querySelectorAll('[data-use]').forEach((button) => {
          button.addEventListener('click', () => useCandidate(button.dataset.use, Number(button.dataset.index)));
        });
      }

      function candidateColumn(title, role, candidates) {
        const body = candidates.length ? candidates.map((candidate, index) => `
          <div class="candidate">
            <strong>${escapeHtml(candidate.label || '名称未取得')}</strong>
            <code>${candidate.lngLat.join(',')}</code>
            <div class="meta">情報源: ${escapeHtml(candidate.source || 'unknown')} / 信頼度: ${escapeHtml(candidate.confidence || 'unknown')}</div>
            <button type="button" class="small" data-use="${role}" data-index="${index}">${role === 'start' ? '開始地点に使う' : '終了地点に使う'}</button>
          </div>
        `).join('') : '<div class="empty">候補が見つかりませんでした。座標を手入力してください。</div>';
        return `<div><h3>${title}</h3><div class="candidate-list">${body}</div></div>`;
      }

      function useCandidate(role, index) {
        const candidate = endpointCandidates?.[role]?.[index];
        if (!candidate?.lngLat) return;
        form.elements[role].value = candidate.lngLat.join(',');
        const preset = readForm();
        const nextBounds = endpointCandidates.bounds || boundsFromPair(preset.start, preset.end) || preset.bounds;
        if (nextBounds) form.elements.bounds.value = nextBounds.join(',');
        save();
        message.textContent = `${role === 'start' ? '開始地点' : '終了地点'}に「${candidate.label}」を採用しました。`;
      }

      function swapEndpoints() {
        const start = form.elements.start.value;
        const end = form.elements.end.value;
        form.elements.start.value = end;
        form.elements.end.value = start;
        save();
        message.textContent = '開始地点と終了地点を入れ替えました。';
      }

      async function testRoute(applyResult) {
        const preset = readForm();
        const params = routeParams(preset, applyResult);
        message.textContent = applyResult ? '確定した起終点でOSMルートを生成しています...' : 'OSMからルートを取得しています...';
        try {
          const response = await fetch(`/api/osm-route128?${params}`, { cache: 'no-store' });
          const data = await response.json();
          if (!response.ok) throw new Error(data.detail || `API ${response.status}`);
          if (applyResult) {
            const meta = data.metadata;
            const next = { ...preset, relationId: String(meta.relationId), routeNumber: String(meta.routeNumber), start: meta.start, end: meta.end, bounds: meta.bounds, title: `国道${meta.routeNumber}号線のミステリー`, kicker: `Route ${meta.routeNumber} / OpenStreetMap`, mapCenter: centerOfBounds(meta.bounds), outroCenter: centerOfBounds(meta.bounds) };
            writeForm(next);
            save();
          }
          message.textContent = `取得成功: 国道${data.metadata.routeNumber}号 / 約${data.metadata.cameraPathKm}km / relation ${data.metadata.relationId}`;
          output.textContent = JSON.stringify({ settings: readForm(), route: data.metadata }, null, 2);
        } catch (error) {
          message.textContent = `取得失敗: ${error.message}`;
        }
      }

      function routeParams(preset, autoMode) {
        const params = new URLSearchParams({ routeNumber: preset.routeNumber });
        if (!autoMode && preset.relationId) params.set('relationId', preset.relationId);
        if (Array.isArray(preset.start)) params.set('start', preset.start.join(','));
        if (Array.isArray(preset.end)) params.set('end', preset.end.join(','));
        if (Array.isArray(preset.bounds)) params.set('bounds', preset.bounds.join(','));
        return params;
      }
      function save() { const preset = readForm(); localStorage.setItem(STORAGE_KEY, JSON.stringify(preset)); render(); }
      function loadSaved() { try { const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); if (Object.keys(saved).length) writeForm(saved); } catch (error) {} }
      function render() { output.textContent = JSON.stringify(readForm(), null, 2); }
      function readForm() { const data = new FormData(form); const get = (name) => String(data.get(name) || '').trim(); const num = (name) => Number(get(name)); return { routeNumber: get('routeNumber'), relationId: get('relationId'), start: coord(get('start')), end: coord(get('end')), bounds: bounds(get('bounds')), title: get('title'), kicker: get('kicker'), red: get('red'), introZoom: num('introZoom'), followZoom: num('followZoom'), outroZoom: num('outroZoom'), pitch: num('pitch'), terrain: num('terrain'), followDuration: num('followDuration'), outroDuration: num('outroDuration'), mapCenter: coord(get('mapCenter')), outroCenter: coord(get('outroCenter')), guideOpacity: num('guideOpacity'), glowScale: num('glowScale'), reflectionScale: num('reflectionScale') }; }
      function writeForm(values) { for (const [key, value] of Object.entries(values)) { const field = form.elements[key]; if (!field) continue; field.value = Array.isArray(value) ? value.join(',') : (value ?? ''); } render(); }
      function coord(value) { if (!String(value || '').trim()) return null; const parts = String(value).split(',').map((item) => Number(item.trim())); return parts.length === 2 && parts.every(Number.isFinite) && !(parts[0] === 0 && parts[1] === 0) ? parts : null; }
      function bounds(value) { if (!String(value || '').trim()) return null; const parts = String(value).split(',').map((item) => Number(item.trim())); return parts.length === 4 && parts.every(Number.isFinite) && !parts.every((part) => part === 0) ? parts : null; }
      function boundsFromPair(start, end) { if (!start || !end) return null; const pad = 0.08; return [Math.min(start[0], end[0]) - pad, Math.min(start[1], end[1]) - pad, Math.max(start[0], end[0]) + pad, Math.max(start[1], end[1]) + pad].map((value) => Math.round(value * 100000) / 100000); }
      function centerOfBounds(value) { return Array.isArray(value) && value.length === 4 ? [(value[0] + value[2]) / 2, (value[1] + value[3]) / 2] : null; }
      function escapeHtml(value) { return String(value).replace(/[&<>"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char])); }
    </script>
  </body>
</html>
