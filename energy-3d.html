<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Route 128 3D Energy Director</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css" rel="stylesheet">
    <style>
      html, body, #map { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #020304; }
      .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib, .mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none !important; }
      #black-grade { position: fixed; inset: 0; pointer-events: none; background: linear-gradient(rgba(0,0,0,.18), rgba(0,0,0,.26)); mix-blend-mode: multiply; }
      #vignette { position: fixed; inset: 0; pointer-events: none; background: radial-gradient(circle at 50% 45%, rgba(0,0,0,0) 0, rgba(0,0,0,.15) 42%, rgba(0,0,0,.7) 100%); }
      #title-card { position: fixed; left: clamp(28px, 5vw, 72px); bottom: clamp(28px, 7vh, 86px); max-width: min(780px, calc(100vw - 56px)); opacity: 0; transform: translateY(16px); transition: opacity 900ms ease, transform 900ms ease; pointer-events: none; text-shadow: 0 4px 30px rgba(255, 28, 20, .72), 0 3px 20px rgba(0,0,0,.95); }
      #title-card.visible { opacity: 1; transform: translateY(0); }
      #scene-kicker { margin: 0 0 10px; color: #ff9b88; font: 700 clamp(12px, 1.15vw, 17px)/1.45 system-ui, sans-serif; letter-spacing: 0; }
      #scene-title { margin: 0; color: #fff1ec; font: 800 clamp(30px, 4.5vw, 72px)/1.12 "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif; letter-spacing: 0; }
      #status { position: fixed; right: 18px; top: 16px; max-width: min(390px, calc(100vw - 36px)); padding: 8px 10px; border: 1px solid rgba(255, 66, 44, .34); background: rgba(0, 0, 0, .72); color: #ffe7df; font: 12px/1.5 system-ui, sans-serif; pointer-events: none; box-shadow: 0 0 22px rgba(255, 24, 24, .18); }
      body.ready #status { opacity: .36; }
    </style>
  </head>
  <body>
    <main id="map"></main>
    <div id="black-grade"></div>
    <div id="vignette"></div>
    <section id="title-card" aria-live="polite">
      <p id="scene-kicker">Route 128 / 3D Terrain</p>
      <h1 id="scene-title">地形に走る赤い痕跡</h1>
    </section>
    <div id="status">Mapbox token required</div>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.js"></script>
    <script>
      (async function boot() {
        const config = await loadRemoteConfig();
        const token = (window.MAPBOX_TOKEN || config.mapboxToken || new URLSearchParams(location.search).get('token') || '').trim();
        const titleCard = document.getElementById('title-card');
        const sceneTitle = document.getElementById('scene-title');
        const status = document.getElementById('status');
        const state = { storyline: null, sceneIndex: -1, autoplayTimer: null, energyFrame: null };

        if (!token) status.textContent = 'Set MAPBOX_TOKEN in Vercel';
        mapboxgl.accessToken = token;

        const map = new mapboxgl.Map({
          container: 'map',
          style: 'mapbox://styles/mapbox/dark-v11',
          center: [140.34, 35.33],
          zoom: 10.9,
          pitch: 73,
          bearing: 24,
          antialias: true,
          attributionControl: false,
          logoPosition: 'bottom-left'
        });

        map.dragRotate.disable();
        map.touchZoomRotate.disableRotation();

        await once(map, 'load');
        tuneMapForBlackCinema(map);
        add3DTerrainAndRelief(map);
        add3DBuildings(map);
        hideModernPoiLabels(map);
        await addEnergyRoute(map);
        state.storyline = await loadStoryline(config);
        document.body.classList.add('ready');
        status.textContent = 'Space: next scene / R: autoplay';
        await waitForIdle(map);
        goToScene(0);

        window.addEventListener('keydown', (event) => {
          if (event.code === 'Space') { event.preventDefault(); goToScene(state.sceneIndex + 1); }
          if (event.key.toLowerCase() === 'r') { event.preventDefault(); startAutopilot(); }
        });

        async function goToScene(nextIndex, options = {}) {
          const scenes = state.storyline.scenes;
          const index = ((nextIndex % scenes.length) + scenes.length) % scenes.length;
          const scene = scenes[index];
          state.sceneIndex = index;
          sceneTitle.textContent = scene.title;
          status.textContent = `${index + 1}/${scenes.length}: ${scene.title}`;
          titleCard.classList.remove('visible');
          runEnergyPulse();

          map.flyTo({
            center: scene.lngLat,
            zoom: Math.max(scene.zoom, 12.4),
            pitch: Math.max(scene.pitch || 73, 73),
            bearing: scene.bearing + 10,
            duration: options.instant ? 0 : scene.duration,
            curve: 1.42,
            speed: .48,
            essential: true
          });

          await once(map, 'moveend');
          await waitForIdle(map);
          titleCard.classList.add('visible');
        }

        function tuneMapForBlackCinema(targetMap) {
          const layers = targetMap.getStyle().layers || [];
          for (const layer of layers) {
            if (layer.type === 'background') targetMap.setPaintProperty(layer.id, 'background-color', '#030405');
            if (layer.type === 'fill') {
              targetMap.setPaintProperty(layer.id, 'fill-color', '#101315');
              targetMap.setPaintProperty(layer.id, 'fill-opacity', .82);
            }
            if (layer.type === 'line') {
              targetMap.setPaintProperty(layer.id, 'line-color', '#252a2d');
              targetMap.setPaintProperty(layer.id, 'line-opacity', .34);
            }
            if (layer.type === 'symbol') {
              targetMap.setPaintProperty(layer.id, 'text-color', '#555b60');
              targetMap.setPaintProperty(layer.id, 'text-halo-color', '#050607');
              targetMap.setPaintProperty(layer.id, 'text-halo-width', .55);
              targetMap.setPaintProperty(layer.id, 'text-opacity', .46);
              targetMap.setPaintProperty(layer.id, 'icon-opacity', .22);
            }
          }
        }

        function add3DTerrainAndRelief(targetMap) {
          targetMap.addSource('mapbox-dem', {
            type: 'raster-dem',
            url: 'mapbox://mapbox.mapbox-terrain-dem-v1',
            tileSize: 512,
            maxzoom: 14
          });
          targetMap.setTerrain({ source: 'mapbox-dem', exaggeration: 2.15 });
          targetMap.addLayer({
            id: 'cinematic-hillshade',
            type: 'hillshade',
            source: 'mapbox-dem',
            paint: {
              'hillshade-shadow-color': '#000000',
              'hillshade-highlight-color': '#30363a',
              'hillshade-accent-color': '#15191c',
              'hillshade-illumination-direction': 315,
              'hillshade-exaggeration': .78
            }
          });
          targetMap.setFog({
            color: 'rgb(2, 3, 4)',
            'high-color': 'rgb(16, 18, 20)',
            'horizon-blend': .035,
            'space-color': 'rgb(0, 0, 0)',
            'star-intensity': 0
          });
        }

        function add3DBuildings(targetMap) {
          const labelLayer = (targetMap.getStyle().layers || []).find((layer) => layer.type === 'symbol' && layer.layout && layer.layout['text-field']);
          targetMap.addLayer({
            id: '3d-buildings-cinematic',
            source: 'composite',
            'source-layer': 'building',
            filter: ['==', ['get', 'extrude'], 'true'],
            type: 'fill-extrusion',
            minzoom: 14,
            paint: {
              'fill-extrusion-color': ['interpolate', ['linear'], ['zoom'], 14, '#090b0d', 17, '#15191d'],
              'fill-extrusion-height': ['interpolate', ['linear'], ['zoom'], 14, 0, 15.5, ['get', 'height']],
              'fill-extrusion-base': ['interpolate', ['linear'], ['zoom'], 14, 0, 15.5, ['get', 'min_height']],
              'fill-extrusion-opacity': .74,
              'fill-extrusion-vertical-gradient': true
            }
          }, labelLayer && labelLayer.id);
        }

        async function addEnergyRoute(targetMap) {
          targetMap.addSource('route128', { type: 'geojson', data: './route128.geojson', lineMetrics: true });
          targetMap.addLayer({ id: 'route128-blood-haze', type: 'line', source: 'route128', paint: { 'line-color': '#3a0000', 'line-width': ['interpolate', ['linear'], ['zoom'], 8, 34, 14, 76, 17, 120], 'line-blur': 42, 'line-opacity': .88 } });
          targetMap.addLayer({ id: 'route128-shadow', type: 'line', source: 'route128', paint: { 'line-color': '#7a0000', 'line-width': ['interpolate', ['linear'], ['zoom'], 8, 25, 14, 58, 17, 92], 'line-blur': 32, 'line-opacity': .9 } });
          targetMap.addLayer({ id: 'route128-glow-outer', type: 'line', source: 'route128', paint: { 'line-color': '#ff0808', 'line-width': ['interpolate', ['linear'], ['zoom'], 8, 18, 14, 42, 17, 70], 'line-blur': 23, 'line-opacity': .95 } });
          targetMap.addLayer({ id: 'route128-glow-inner', type: 'line', source: 'route128', paint: { 'line-color': '#ff2a16', 'line-width': ['interpolate', ['linear'], ['zoom'], 8, 9, 14, 24, 17, 40], 'line-blur': 10, 'line-opacity': .98 } });
          targetMap.addLayer({ id: 'route128-hot-core', type: 'line', source: 'route128', paint: { 'line-color': '#ff5b32', 'line-width': ['interpolate', ['linear'], ['zoom'], 8, 5, 14, 13, 17, 22], 'line-blur': 2.4, 'line-opacity': .98 } });
          targetMap.addLayer({ id: 'route128-core', type: 'line', source: 'route128', paint: { 'line-color': '#fff0dc', 'line-width': ['interpolate', ['linear'], ['zoom'], 8, 2.2, 14, 6.5, 17, 11], 'line-blur': .45, 'line-opacity': 1 } });
          targetMap.addLayer({ id: 'route128-scan-wide', type: 'line', source: 'route128', paint: { 'line-width': ['interpolate', ['linear'], ['zoom'], 8, 20, 14, 48, 17, 78], 'line-blur': 18, 'line-opacity': 1, 'line-gradient': ['rgba', 255, 32, 24, 0] } });
          targetMap.addLayer({ id: 'route128-scan', type: 'line', source: 'route128', paint: { 'line-width': ['interpolate', ['linear'], ['zoom'], 8, 9, 14, 24, 17, 40], 'line-blur': 5, 'line-opacity': 1, 'line-gradient': ['rgba', 255, 32, 24, 0] } });
        }

        function runEnergyPulse() {
          if (state.energyFrame) cancelAnimationFrame(state.energyFrame);
          const started = performance.now();
          const step = (now) => {
            const elapsed = now - started;
            const t = (elapsed / 5200) % 1;
            const tail = Math.max(0, t - .22);
            const hot = .72 + Math.pow(Math.sin(elapsed / 1000 * 6.2), 8) * .28;
            if (map.getLayer('route128-glow-inner')) {
              map.setPaintProperty('route128-blood-haze', 'line-opacity', .74 + hot * .18);
              map.setPaintProperty('route128-glow-outer', 'line-opacity', .8 + hot * .2);
              map.setPaintProperty('route128-glow-inner', 'line-opacity', .82 + hot * .18);
              map.setPaintProperty('route128-hot-core', 'line-opacity', .84 + hot * .16);
              map.setPaintProperty('route128-scan-wide', 'line-gradient', [
                'interpolate', ['linear'], ['line-progress'],
                0, 'rgba(255, 12, 8, 0)',
                tail, 'rgba(255, 18, 12, 0)',
                Math.max(tail, t - .085), 'rgba(255, 0, 0, .48)',
                Math.max(tail, t - .035), 'rgba(255, 56, 28, .9)',
                t, 'rgba(255, 244, 220, 1)',
                Math.min(1, t + .055), 'rgba(255, 25, 12, .5)',
                1, 'rgba(255, 18, 12, 0)'
              ]);
              map.setPaintProperty('route128-scan', 'line-gradient', [
                'interpolate', ['linear'], ['line-progress'],
                0, 'rgba(255, 18, 12, 0)',
                tail, 'rgba(255, 20, 14, 0)',
                Math.max(tail, t - .045), 'rgba(255, 58, 26, .85)',
                t, 'rgba(255, 255, 236, 1)',
                Math.min(1, t + .035), 'rgba(255, 46, 24, .42)',
                1, 'rgba(255, 18, 12, 0)'
              ]);
            }
            state.energyFrame = requestAnimationFrame(step);
          };
          state.energyFrame = requestAnimationFrame(step);
        }

        function startAutopilot() {
          if (state.autoplayTimer) clearTimeout(state.autoplayTimer);
          goToScene(0, { instant: state.sceneIndex === -1 });
          let next = 1;
          const schedule = () => {
            const current = state.storyline.scenes[state.sceneIndex];
            state.autoplayTimer = setTimeout(async () => {
              await goToScene(next);
              next = (next + 1) % state.storyline.scenes.length;
              schedule();
            }, Math.max(2800, current.duration + 1800));
          };
          schedule();
        }

        function hideModernPoiLabels(targetMap) {
          const hidden = [/poi-label/, /transit-label/, /airport-label/, /settlement-subdivision-label/, /building-number-label/];
          for (const layer of targetMap.getStyle().layers || []) {
            if (layer.type === 'symbol' && hidden.some((pattern) => pattern.test(layer.id))) targetMap.setLayoutProperty(layer.id, 'visibility', 'none');
          }
        }

        async function loadRemoteConfig() {
          try { const response = await fetch('/api/config', { cache: 'no-store' }); return response.ok ? response.json() : {}; }
          catch (error) { return {}; }
        }

        async function loadStoryline(config) {
          if (config.supabaseUrl && config.supabaseAnonKey) {
            try {
              const endpoint = `${config.supabaseUrl}/rest/v1/scenes?select=*&order=sort_order.asc`;
              const response = await fetch(endpoint, { headers: { apikey: config.supabaseAnonKey, authorization: `Bearer ${config.supabaseAnonKey}` } });
              const rows = response.ok ? await response.json() : [];
              if (rows.length) return { scenes: rows.map((row) => ({ id: row.id, title: row.title, lngLat: row.lng_lat, zoom: row.zoom, pitch: row.pitch, bearing: row.bearing, duration: row.duration, overlayImage: row.overlay_image, overlayCoords: row.overlay_coords, highlightRouteId: row.highlight_route_id })) };
            } catch (error) { console.warn(error); }
          }
          const fallback = await fetch('./storyline.json');
          return fallback.json();
        }

        function waitForIdle(targetMap) { return targetMap.loaded() && targetMap.areTilesLoaded() ? Promise.resolve() : once(targetMap, 'idle'); }
        function once(targetMap, eventName) { return new Promise((resolve) => targetMap.once(eventName, resolve)); }
      }());
    </script>
  </body>
</html>
