<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>国道128号線のミステリー</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css" rel="stylesheet">
    <style>
      html, body, #map { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #182026; }
      .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib, .mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none !important; }
      #black-grade { position: fixed; inset: 0; pointer-events: none; background: linear-gradient(rgba(0,0,0,.02), rgba(0,0,0,.05)); mix-blend-mode: multiply; }
      #vignette { position: fixed; inset: 0; pointer-events: none; background: radial-gradient(circle at 50% 45%, rgba(0,0,0,0) 0, rgba(0,0,0,.02) 54%, rgba(0,0,0,.24) 100%); }
      #title-card { position: fixed; left: clamp(28px, 5vw, 72px); bottom: clamp(28px, 7vh, 86px); max-width: min(780px, calc(100vw - 56px)); opacity: 0; transform: translateY(16px); transition: opacity 900ms ease, transform 900ms ease; pointer-events: none; text-shadow: 0 4px 30px rgba(255, 28, 20, .72), 0 3px 20px rgba(0,0,0,.95); }
      #title-card.visible { opacity: 1; transform: translateY(0); }
      #scene-kicker { margin: 0 0 10px; color: #ff9b88; font: 700 clamp(12px, 1.15vw, 17px)/1.45 system-ui, sans-serif; letter-spacing: 0; }
      #scene-title { margin: 0; color: #fff1ec; font: 800 clamp(30px, 4.5vw, 72px)/1.12 "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif; letter-spacing: 0; }
      #status { position: fixed; right: 18px; top: 16px; max-width: min(430px, calc(100vw - 36px)); padding: 8px 10px; border: 1px solid rgba(255, 66, 44, .34); background: rgba(0, 0, 0, .46); color: #ffe7df; font: 12px/1.5 system-ui, sans-serif; pointer-events: none; box-shadow: 0 0 22px rgba(255, 24, 24, .18); }
      body.ready #status { opacity: .38; }
      body.error #status { opacity: 1; border-color: rgba(255, 88, 66, .8); color: #fff0eb; }
    </style>
  </head>
  <body>
    <main id="map"></main>
    <div id="black-grade"></div>
    <div id="vignette"></div>
    <section id="title-card" aria-live="polite">
      <p id="scene-kicker">Route 128 / OpenStreetMap</p>
      <h1 id="scene-title">国道128号線のミステリー</h1>
    </section>
    <div id="status">Loading configuration...</div>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.js"></script>
    <script>
      (async function boot() {
        const CHIBA_START = [140.12462, 35.61059];
        const titleCard = document.getElementById('title-card');
        const sceneTitle = document.getElementById('scene-title');
        const status = document.getElementById('status');
        const state = { storyline: null, sceneIndex: -1, energyFrame: null, routeCoords: [], smoothedBearing: 210 };

        try {
          const config = await loadRemoteConfig();
          const token = (window.MAPBOX_TOKEN || config.mapboxToken || new URLSearchParams(location.search).get('token') || '').trim();
          status.textContent = token ? 'Loading map...' : 'Mapbox token required';
          mapboxgl.accessToken = token;
          const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [140.22, 35.31], zoom: 8.55, pitch: 0, bearing: -35, antialias: true, attributionControl: false, logoPosition: 'bottom-left' });
          window.route128Map = map;
          map.dragRotate.disable();
          map.touchZoomRotate.disableRotation();

          await once(map, 'load');
          tuneMapForReadableTerrain(map);
          addColorZones(map);
          add3DTerrainAndRelief(map);
          add3DBuildings(map);
          hideModernPoiLabels(map);
          await addEnergyRoute(map);
          state.storyline = await loadStoryline(config);
          document.body.classList.add('ready');
          await waitForIdle(map);
          playRouteFilm(map);

          window.addEventListener('keydown', (event) => {
            if (event.code === 'Space') { event.preventDefault(); goToScene(map, state.sceneIndex + 1); }
            if (event.key.toLowerCase() === 'r') { event.preventDefault(); playRouteFilm(map); }
          });
        } catch (error) {
          console.error(error);
          document.body.classList.add('error');
          status.textContent = `Route load stopped: ${error.message}`;
        }

        async function playRouteFilm(map) {
          stopEnergyPulse();
          titleCard.classList.remove('visible');
          const start = state.routeCoords[0] || CHIBA_START;
          state.sceneIndex = 0;
          state.smoothedBearing = 205;
          sceneTitle.textContent = '国道128号線のミステリー';
          map.jumpTo({ center: start, zoom: 12.55, pitch: 74, bearing: 205 });
          setReveal(map, 0, 0);
          await wait(700);
          map.easeTo({ center: start, zoom: 12.85, pitch: 75, bearing: 320, duration: 2500, easing: easeInOutCubic, essential: true });
          await once(map, 'moveend');
          await followRouteCamera(map, 8200);
          await smoothOutro(map);
          titleCard.classList.add('visible');
        }

        async function smoothOutro(map) {
          setReveal(map, 1, .95);
          map.easeTo({ center: [140.08, 35.29], zoom: 8.9, pitch: 58, bearing: 0, duration: 6500, easing: easeInOutCubic, essential: true });
          await once(map, 'moveend');
        }

        async function goToScene(map, nextIndex, options = {}) {
          const scenes = state.storyline.scenes;
          const index = ((nextIndex % scenes.length) + scenes.length) % scenes.length;
          const scene = scenes[index];
          state.sceneIndex = index;
          sceneTitle.textContent = scene.title;
          status.textContent = `${index + 1}/${scenes.length}: ${scene.title}`;
          titleCard.classList.remove('visible');
          startEnergyPulse(map, scene.duration || 9000);
          map.flyTo({ center: scene.lngLat, zoom: Math.max(scene.zoom, 12.4), pitch: Math.max(scene.pitch || 73, 73), bearing: scene.bearing + 14, duration: options.instant ? 0 : scene.duration, curve: 1.42, speed: .48, essential: true });
          await once(map, 'moveend');
          await waitForIdle(map);
          titleCard.classList.add('visible');
        }

        function tuneMapForReadableTerrain(targetMap) {
          for (const layer of targetMap.getStyle().layers || []) {
            if (layer.type === 'background') targetMap.setPaintProperty(layer.id, 'background-color', '#182026');
            if (layer.type === 'fill') { targetMap.setPaintProperty(layer.id, 'fill-color', '#4b5357'); targetMap.setPaintProperty(layer.id, 'fill-opacity', .88); }
            if (layer.type === 'line') { targetMap.setPaintProperty(layer.id, 'line-color', '#7a8388'); targetMap.setPaintProperty(layer.id, 'line-opacity', .6); }
            if (layer.type === 'symbol') { targetMap.setPaintProperty(layer.id, 'text-color', '#c1c8cc'); targetMap.setPaintProperty(layer.id, 'text-halo-color', '#20282d'); targetMap.setPaintProperty(layer.id, 'text-halo-width', .8); targetMap.setPaintProperty(layer.id, 'text-opacity', .72); targetMap.setPaintProperty(layer.id, 'icon-opacity', .38); }
          }
        }

        function addColorZones(targetMap) {
          const firstSymbol = (targetMap.getStyle().layers || []).find((layer) => layer.type === 'symbol');
          const before = firstSymbol && firstSymbol.id;
          targetMap.addLayer({ id: 'cinematic-water-color', type: 'fill', source: 'composite', 'source-layer': 'water', paint: { 'fill-color': '#21485a', 'fill-opacity': .82 } }, before);
          targetMap.addLayer({ id: 'cinematic-forest-color', type: 'fill', source: 'composite', 'source-layer': 'landuse', filter: ['in', ['get', 'class'], ['literal', ['wood', 'forest', 'park', 'grass']]], paint: { 'fill-color': '#4d594a', 'fill-opacity': .36 } }, before);
          targetMap.addLayer({ id: 'cinematic-plain-color', type: 'fill', source: 'composite', 'source-layer': 'landuse', filter: ['in', ['get', 'class'], ['literal', ['farmland', 'scrub', 'grassland']]], paint: { 'fill-color': '#5e5a4d', 'fill-opacity': .44 } }, before);
          targetMap.addLayer({ id: 'cinematic-city-color', type: 'fill', source: 'composite', 'source-layer': 'landuse', filter: ['in', ['get', 'class'], ['literal', ['residential', 'commercial', 'industrial', 'retail']]], paint: { 'fill-color': '#5e5a62', 'fill-opacity': .5 } }, before);
        }

        function add3DTerrainAndRelief(targetMap) {
          targetMap.addSource('mapbox-dem', { type: 'raster-dem', url: 'mapbox://mapbox.mapbox-terrain-dem-v1', tileSize: 512, maxzoom: 14 });
          targetMap.setTerrain({ source: 'mapbox-dem', exaggeration: 2.05 });
          targetMap.addLayer({ id: 'cinematic-hillshade', type: 'hillshade', source: 'mapbox-dem', paint: { 'hillshade-shadow-color': '#11161a', 'hillshade-highlight-color': '#c0c8cc', 'hillshade-accent-color': '#758087', 'hillshade-illumination-direction': 315, 'hillshade-exaggeration': 1.0 } });
          targetMap.setFog({ color: 'rgb(28, 32, 36)', 'high-color': 'rgb(86, 92, 98)', 'horizon-blend': .08, 'space-color': 'rgb(5, 7, 9)', 'star-intensity': 0 });
        }

        function add3DBuildings(targetMap) {
          const labelLayer = (targetMap.getStyle().layers || []).find((layer) => layer.type === 'symbol' && layer.layout && layer.layout['text-field']);
          targetMap.addLayer({ id: '3d-buildings-cinematic', source: 'composite', 'source-layer': 'building', filter: ['==', ['get', 'extrude'], 'true'], type: 'fill-extrusion', minzoom: 14, paint: { 'fill-extrusion-color': ['interpolate', ['linear'], ['zoom'], 14, '#3f2527', 17, '#6d3838'], 'fill-extrusion-height': ['interpolate', ['linear'], ['zoom'], 14, 0, 15.5, ['get', 'height']], 'fill-extrusion-base': ['interpolate', ['linear'], ['zoom'], 14, 0, 15.5, ['get', 'min_height']], 'fill-extrusion-opacity': .82, 'fill-extrusion-vertical-gradient': true } }, labelLayer && labelLayer.id);
        }

        async function addEnergyRoute(targetMap) {
          const route = await loadRoute128();
          state.routeCoords = route.features[0].geometry.coordinates;
          targetMap.addSource('route128', { type: 'geojson', data: route, lineMetrics: true });
          const width = (a, b, c) => ['interpolate', ['linear'], ['zoom'], 8, a, 14, b, 17, c];
          const layers = [
            ['route128-glow-outer', 12, 31, 52, 13, .72],
            ['route128-glow-inner', 7, 19, 32, 5, .9],
            ['route128-hot-core', 4, 11, 19, 1.2, .98],
            ['route128-core', 2.2, 6.5, 11, .25, 1]
          ];
          for (const [id, w8, w14, w17, blur, opacity] of layers) targetMap.addLayer({ id, type: 'line', source: 'route128', paint: { 'line-width': width(w8, w14, w17), 'line-blur': blur, 'line-opacity': opacity, 'line-gradient': transparentGradient() } });
        }

        async function loadRoute128() {
          status.textContent = 'Loading OSM relation via Vercel API...';
          const response = await fetch('/api/osm-route128', { cache: 'no-store' });
          if (!response.ok) throw new Error(`API ${response.status}`);
          const route = await response.json();
          const feature = normalizeCameraFeature(route);
          status.textContent = `OSM relation via API: ${route.metadata?.cameraPathKm || '?'} km / skipped ${route.metadata?.skippedParallelChains || 0}`;
          return { ...route, features: [feature] };
        }

        function normalizeCameraFeature(route) {
          const feature = route.features?.find((item) => item.properties?.role === 'camera-path') || route.features?.[0];
          if (!feature?.geometry?.coordinates?.length) throw new Error('Route has no coordinates');
          return feature;
        }

        async function followRouteCamera(map, duration) {
          stopEnergyPulse();
          const path = buildPath(state.routeCoords);
          const started = performance.now();
          return new Promise((resolve) => {
            const frame = (now) => {
              const progress = clamp((now - started) / duration, 0, 1);
              const eased = easeInOutSine(progress);
              const point = pointAt(path, eased);
              const lookAhead = pointAt(path, Math.min(1, eased + .045));
              const targetBearing = bearingBetween(point.coord, lookAhead.coord);
              state.smoothedBearing = smoothBearing(state.smoothedBearing, targetBearing, .085);
              const pulse = .72 + Math.pow(Math.sin((now - started) / 1000 * 6.2), 8) * .28;
              setReveal(map, eased, pulse);
              const zoom = 13.05 + Math.sin(Math.PI * eased) * .72;
              const pitch = 74 - Math.max(0, eased - .88) * 44;
              map.jumpTo({ center: point.coord, zoom, pitch, bearing: state.smoothedBearing });
              if (progress < 1) requestAnimationFrame(frame); else { setReveal(map, 1, pulse); resolve(); }
            };
            requestAnimationFrame(frame);
          });
        }

        function startEnergyPulse(map, duration) {
          stopEnergyPulse();
          const started = performance.now();
          setReveal(map, 0, 0);
          const step = (now) => {
            const elapsed = now - started;
            const reveal = Math.min(1, elapsed / duration);
            const pulse = .72 + Math.pow(Math.sin(elapsed / 1000 * 6.2), 8) * .28;
            setReveal(map, reveal, pulse);
            state.energyFrame = requestAnimationFrame(step);
          };
          state.energyFrame = requestAnimationFrame(step);
        }

        function stopEnergyPulse() { if (state.energyFrame) cancelAnimationFrame(state.energyFrame); state.energyFrame = null; }
        function setReveal(map, progress, pulse) {
          const p = clamp(progress, 0, 1);
          setGradient(map, 'route128-glow-outer', gradientFor('#ff0808', .42 + pulse * .18, p, .08));
          setGradient(map, 'route128-glow-inner', gradientFor('#ff2a16', .62 + pulse * .16, p, .055));
          setGradient(map, 'route128-hot-core', gradientFor('#ff6a38', .82 + pulse * .12, p, .035));
          setGradient(map, 'route128-core', gradientFor('#fff0dc', .94, p, .018));
        }

        function gradientFor(color, opacity, progress, softness) { const rgba = hexToRgba(color, opacity); const dim = hexToRgba(color, opacity * .45); const p = clamp(progress, 0, 1); return ['interpolate', ['linear'], ['line-progress'], 0, rgba, Math.max(0, p - softness), dim, p, rgba, Math.min(1, p + .002), 'rgba(255, 0, 0, 0)', 1, 'rgba(255, 0, 0, 0)']; }
        function buildPath(coords) { const segments = []; let total = 0; for (let i = 0; i < coords.length - 1; i++) { const a = coords[i]; const b = coords[i + 1]; const length = distance(a, b); segments.push({ a, b, start: total, end: total + length, length }); total += length; } return { segments, total }; }
        function pointAt(path, progress) { const target = path.total * clamp(progress, 0, 1); const segment = path.segments.find((item) => target <= item.end) || path.segments[path.segments.length - 1]; const local = segment.length ? (target - segment.start) / segment.length : 0; return { coord: [lerp(segment.a[0], segment.b[0], local), lerp(segment.a[1], segment.b[1], local)] }; }
        function distance(a, b) { const x = (b[0] - a[0]) * Math.cos(((a[1] + b[1]) / 2) * Math.PI / 180); const y = b[1] - a[1]; return Math.sqrt(x * x + y * y); }
        function bearingBetween(a, b) { const y = Math.sin((b[0] - a[0]) * Math.PI / 180) * Math.cos(b[1] * Math.PI / 180); const x = Math.cos(a[1] * Math.PI / 180) * Math.sin(b[1] * Math.PI / 180) - Math.sin(a[1] * Math.PI / 180) * Math.cos(b[1] * Math.PI / 180) * Math.cos((b[0] - a[0]) * Math.PI / 180); return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360; }
        function smoothBearing(current, target, amount) { const delta = ((((target - current) % 360) + 540) % 360) - 180; return (current + delta * amount + 360) % 360; }
        function transparentGradient() { return ['interpolate', ['linear'], ['line-progress'], 0, 'rgba(255,0,0,0)', 1, 'rgba(255,0,0,0)']; }
        function setGradient(map, layerId, gradient) { if (map.getLayer(layerId)) map.setPaintProperty(layerId, 'line-gradient', gradient); }
        function hexToRgba(hex, alpha) { const value = hex.replace('#', ''); const r = parseInt(value.slice(0, 2), 16); const g = parseInt(value.slice(2, 4), 16); const b = parseInt(value.slice(4, 6), 16); return `rgba(${r}, ${g}, ${b}, ${clamp(alpha, 0, 1)})`; }
        function hideModernPoiLabels(targetMap) { const hidden = [/poi-label/, /transit-label/, /airport-label/, /settlement-subdivision-label/, /building-number-label/]; for (const layer of targetMap.getStyle().layers || []) { if (layer.type === 'symbol' && hidden.some((pattern) => pattern.test(layer.id))) targetMap.setLayoutProperty(layer.id, 'visibility', 'none'); } }
        async function loadRemoteConfig() { try { const response = await fetch('/api/config', { cache: 'no-store' }); return response.ok ? response.json() : {}; } catch (error) { return {}; } }
        async function loadStoryline(config) { if (config.supabaseUrl && config.supabaseAnonKey) { try { const endpoint = `${config.supabaseUrl}/rest/v1/scenes?select=*&order=sort_order.asc`; const response = await fetch(endpoint, { headers: { apikey: config.supabaseAnonKey, authorization: `Bearer ${config.supabaseAnonKey}` } }); const rows = response.ok ? await response.json() : []; if (rows.length) return { scenes: rows.map((row) => ({ id: row.id, title: row.title, lngLat: row.lng_lat, zoom: row.zoom, pitch: row.pitch, bearing: row.bearing, duration: row.duration, overlayImage: row.overlay_image, overlayCoords: row.overlay_coords, highlightRouteId: row.highlight_route_id })) }; } catch (error) { console.warn(error); } } const fallback = await fetch('./storyline.json'); return fallback.json(); }
        function waitForIdle(targetMap) { return targetMap.loaded() && targetMap.areTilesLoaded() ? Promise.resolve() : once(targetMap, 'idle'); }
        function once(targetMap, eventName) { return new Promise((resolve) => targetMap.once(eventName, resolve)); }
        function wait(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
        function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
        function lerp(a, b, t) { return a + (b - a) * t; }
        function easeInOutCubic(t) { return t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
        function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }
      }());
    </script>
  </body>
</html>
