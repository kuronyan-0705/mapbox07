<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>国道演出システム</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css" rel="stylesheet">
    <style>
      html, body, #map { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #182026; }
      .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib, .mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none !important; }
      #black-grade { position: fixed; inset: 0; pointer-events: none; background: linear-gradient(rgba(0,0,0,.02), rgba(0,0,0,.05)); mix-blend-mode: multiply; }
      #vignette { position: fixed; inset: 0; pointer-events: none; background: radial-gradient(circle at 50% 45%, rgba(0,0,0,0) 0, rgba(0,0,0,.02) 54%, rgba(0,0,0,.24) 100%); }
      #title-card { position: fixed; left: clamp(28px, 5vw, 72px); right: clamp(28px, 5vw, 72px); bottom: clamp(28px, 7vh, 86px); opacity: 0; transform: translateY(16px); transition: opacity 900ms ease, transform 900ms ease; pointer-events: none; text-shadow: 0 4px 30px rgba(255, 28, 20, .72), 0 3px 20px rgba(0,0,0,.95); visibility: hidden; }
      #title-card.visible { opacity: 1; transform: translateY(0); visibility: visible; }
      #scene-kicker { margin: 0 0 10px; color: #ff9b88; font: 700 clamp(12px, 1.15vw, 17px)/1.45 system-ui, sans-serif; letter-spacing: 0; }
      #scene-title { margin: 0; color: #fff1ec; font: 800 clamp(28px, 4.1vw, 68px)/1.1 "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif; letter-spacing: 0; white-space: nowrap; overflow: visible; max-width: 100%; }
      #status { position: fixed; right: 18px; top: 16px; max-width: min(520px, calc(100vw - 36px)); padding: 8px 10px; border: 1px solid rgba(255, 66, 44, .34); background: rgba(0, 0, 0, .46); color: #ffe7df; font: 12px/1.5 system-ui, sans-serif; pointer-events: none; box-shadow: 0 0 22px rgba(255, 24, 24, .18); }
      body.ready #status { opacity: .38; }
      body.error #status { opacity: 1; border-color: rgba(255, 88, 66, .8); color: #fff0eb; }
      body.recording #status { display: none; }
      @media (max-width: 760px) { #scene-title { white-space: normal; font-size: clamp(28px, 9vw, 48px); } }
    </style>
  </head>
  <body>
    <main id="map"></main>
    <div id="black-grade"></div>
    <div id="vignette"></div>
    <section id="title-card" aria-live="polite">
      <p id="scene-kicker">Route 128 / OpenStreetMap</p>
      <h1 id="scene-title">国道128号線のミステリー</h1>
    </section>
    <div id="status">Loading configuration...</div>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.js"></script>
    <script>
      (async function boot() {
        const query = new URLSearchParams(location.search);
        const isRecording = query.get('record') === '1';
        if (isRecording) document.body.classList.add('recording');
        const DEFAULT_PRESET = {
          routeNumber: '128', relationId: '9069158', title: '国道128号線のミステリー', kicker: 'Route 128 / OpenStreetMap',
          start: [140.12462, 35.61059], end: [139.86315, 34.99318], bounds: [139.72, 34.86, 140.62, 35.72],
          mapCenter: [140.22, 35.31], outroCenter: [140.08, 35.29], introZoom: 12.55, followZoom: 13.05, outroZoom: 8.9,
          pitch: 74, terrain: 2.05, followDuration: 8200, outroDuration: 6500, red: '#ff1208', glowScale: 1, reflectionScale: 1, guideOpacity: .72,
          prewarmDuration: 4200, adaptiveTilePace: 1
        };
        const preset = loadDirectorPreset(DEFAULT_PRESET);
        const titleCard = document.getElementById('title-card');
        const sceneTitle = document.getElementById('scene-title');
        const sceneKicker = document.getElementById('scene-kicker');
        const status = document.getElementById('status');
        const state = { storyline: null, sceneIndex: -1, energyFrame: null, routeCoords: [], smoothedBearing: 210, map: null, playing: false };
        try {
          document.title = preset.title; sceneTitle.textContent = preset.title; sceneKicker.textContent = preset.kicker; titleCard.classList.remove('visible');
          const config = await loadRemoteConfig();
          const token = cleanMapboxToken(query.get('token') || window.MAPBOX_TOKEN || config.mapboxToken || '');
          if (!isValidMapboxToken(token)) throw new Error('Mapbox token is invalid');
          mapboxgl.accessToken = token;
          status.textContent = 'Loading map...';
          const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: preset.mapCenter, zoom: 8.55, pitch: 0, bearing: -35, antialias: true, attributionControl: false, logoPosition: 'bottom-left', failIfMajorPerformanceCaveat: false });
          state.map = map;
          map.on('error', (event) => { if (event.error?.message) status.textContent = `Map warning: ${event.error.message}`; });
          map.dragRotate.disable(); map.touchZoomRotate.disableRotation();
          await once(map, 'load');
          tuneMapForReadableTerrain(map); addColorZones(map); add3DTerrainAndRelief(map); add3DBuildings(map); hideModernPoiLabels(map);
          await addEnergyRoute(map);
          state.storyline = await loadStoryline(config);
          await waitForIdleOrTimeout(map, 2400);
          await prewarmRouteTiles(map);
          document.body.classList.add('ready');
          prepareOpeningFrame(map);
          if (!isRecording) playRouteFilm(map);
          window.addEventListener('keydown', (event) => {
            if (event.code === 'Space') { event.preventDefault(); goToScene(map, state.sceneIndex + 1); }
            if (event.key.toLowerCase() === 'r') { event.preventDefault(); playRouteFilm(map); }
          });
        } catch (error) {
          console.error(error); document.body.classList.add('error'); status.textContent = `Route load stopped: ${error.message}`;
        }
        function prepareOpeningFrame(map) { stopEnergyPulse(); titleCard.classList.remove('visible'); const start = state.routeCoords[0] || preset.start; state.smoothedBearing = 205; map.jumpTo({ center: start, zoom: preset.introZoom, pitch: preset.pitch, bearing: 205 }); setRouteReveal(map, 0, .95); }
        async function playRouteFilm(map) { if (state.playing) return; state.playing = true; stopEnergyPulse(); titleCard.classList.remove('visible'); const start = state.routeCoords[0] || preset.start; state.sceneIndex = 0; state.smoothedBearing = 205; sceneTitle.textContent = preset.title; sceneKicker.textContent = preset.kicker; map.stop(); map.jumpTo({ center: start, zoom: preset.introZoom, pitch: preset.pitch, bearing: 205 }); setRouteReveal(map, 0, .95); await waitForIdleOrTimeout(map, 1000); await wait(500); map.easeTo({ center: start, zoom: preset.introZoom + .3, pitch: Math.min(85, preset.pitch + 1), bearing: 320, duration: 2500, easing: easeInOutCubic, essential: true }); await onceOrTimeout(map, 'moveend', 3200); await waitForIdleOrTimeout(map, 1400); setRouteReveal(map, 0, .98); await followRouteCamera(map, preset.followDuration); setRouteReveal(map, 1, 1); startEnergyFlow(map); await smoothOutro(map); titleCard.classList.add('visible'); state.playing = false; }
        async function smoothOutro(map) { map.easeTo({ center: preset.outroCenter, zoom: preset.outroZoom, pitch: 58, bearing: 0, duration: preset.outroDuration, easing: easeInOutCubic, essential: true }); await onceOrTimeout(map, 'moveend', preset.outroDuration + 1200); }
        async function goToScene(map, nextIndex, options = {}) { const scenes = state.storyline.scenes; const index = ((nextIndex % scenes.length) + scenes.length) % scenes.length; const scene = scenes[index]; state.sceneIndex = index; sceneTitle.textContent = scene.title; status.textContent = `${index + 1}/${scenes.length}: ${scene.title}`; titleCard.classList.remove('visible'); setRouteReveal(map, 1, 1); map.flyTo({ center: scene.lngLat, zoom: Math.max(scene.zoom, 12.4), pitch: Math.max(scene.pitch || 73, 73), bearing: scene.bearing + 14, duration: options.instant ? 0 : scene.duration, curve: 1.42, speed: .48, essential: true }); await onceOrTimeout(map, 'moveend', (scene.duration || 5000) + 1200); await waitForIdleOrTimeout(map, 1800); titleCard.classList.add('visible'); }
        async function prewarmRouteTiles(map) { if (!state.routeCoords.length || preset.prewarmDuration <= 0) return; status.textContent = 'Preloading route map tiles...'; const path = buildPath(state.routeCoords); const stops = [0, .14, .28, .42, .56, .7, .84, 1]; const perStop = Math.max(260, Math.min(850, preset.prewarmDuration / stops.length)); for (const progress of stops) { const point = pointAt(path, progress); const look = pointAt(path, Math.min(1, progress + .035)); map.jumpTo({ center: point.coord, zoom: Math.max(10.8, preset.followZoom - .45), pitch: Math.max(55, preset.pitch - 8), bearing: bearingBetween(point.coord, look.coord) }); setRouteReveal(map, progress, .9); await waitForIdleOrTimeout(map, perStop); } status.textContent = 'Route tiles ready'; }
        async function followRouteCamera(map, duration) { const path = buildPath(state.routeCoords); let progress = 0; let last = performance.now(); return new Promise((resolve) => { const frame = (now) => { const dt = Math.min(80, now - last); last = now; const loaded = safeTilesLoaded(map); const pace = preset.adaptiveTilePace ? (loaded ? 1 : .32) : 1; progress = clamp(progress + (dt / duration) * pace, 0, 1); const eased = easeInOutSine(progress); const point = pointAt(path, eased); const lookAhead = pointAt(path, Math.min(1, eased + .045)); const targetBearing = bearingBetween(point.coord, lookAhead.coord); state.smoothedBearing = smoothBearing(state.smoothedBearing, targetBearing, .085); const zoom = preset.followZoom + Math.sin(Math.PI * eased) * .72; const pitch = preset.pitch - Math.max(0, eased - .88) * 44; const pulse = .9 + Math.pow(Math.sin(progress * Math.PI * 9), 8) * .14; setRouteReveal(map, eased, pulse); map.jumpTo({ center: point.coord, zoom, pitch, bearing: state.smoothedBearing }); if (!loaded && !document.body.classList.contains('recording')) status.textContent = 'Loading map tiles... pacing camera'; if (progress < 1) requestAnimationFrame(frame); else resolve(); }; requestAnimationFrame(frame); }); }
        function tuneMapForReadableTerrain(targetMap) { for (const layer of targetMap.getStyle().layers || []) { try { if (layer.type === 'background') targetMap.setPaintProperty(layer.id, 'background-color', '#182026'); if (layer.type === 'fill') { targetMap.setPaintProperty(layer.id, 'fill-color', '#4b5357'); targetMap.setPaintProperty(layer.id, 'fill-opacity', .88); } if (layer.type === 'line') { targetMap.setPaintProperty(layer.id, 'line-color', '#7a8388'); targetMap.setPaintProperty(layer.id, 'line-opacity', .6); } if (layer.type === 'symbol') { targetMap.setPaintProperty(layer.id, 'text-color', '#c1c8cc'); targetMap.setPaintProperty(layer.id, 'text-halo-color', '#20282d'); targetMap.setPaintProperty(layer.id, 'text-halo-width', .8); targetMap.setPaintProperty(layer.id, 'text-opacity', .72); targetMap.setPaintProperty(layer.id, 'icon-opacity', .38); } } catch (error) {} } }
        function addColorZones(targetMap) { const firstSymbol = (targetMap.getStyle().layers || []).find((layer) => layer.type === 'symbol'); const before = firstSymbol && firstSymbol.id; safeAddLayer(targetMap, { id: 'cinematic-water-color', type: 'fill', source: 'composite', 'source-layer': 'water', paint: { 'fill-color': '#21485a', 'fill-opacity': .82 } }, before); safeAddLayer(targetMap, { id: 'cinematic-forest-color', type: 'fill', source: 'composite', 'source-layer': 'landuse', filter: ['in', ['get', 'class'], ['literal', ['wood', 'forest', 'park', 'grass']]], paint: { 'fill-color': '#4d594a', 'fill-opacity': .36 } }, before); safeAddLayer(targetMap, { id: 'cinematic-plain-color', type: 'fill', source: 'composite', 'source-layer': 'landuse', filter: ['in', ['get', 'class'], ['literal', ['farmland', 'scrub', 'grassland']]], paint: { 'fill-color': '#5e5a4d', 'fill-opacity': .44 } }, before); safeAddLayer(targetMap, { id: 'cinematic-city-color', type: 'fill', source: 'composite', 'source-layer': 'landuse', filter: ['in', ['get', 'class'], ['literal', ['residential', 'commercial', 'industrial', 'retail']]], paint: { 'fill-color': '#5e5a62', 'fill-opacity': .5 } }, before); }
        function add3DTerrainAndRelief(targetMap) { if (!targetMap.getSource('mapbox-dem')) targetMap.addSource('mapbox-dem', { type: 'raster-dem', url: 'mapbox://mapbox.mapbox-terrain-dem-v1', tileSize: 512, maxzoom: 14 }); targetMap.setTerrain({ source: 'mapbox-dem', exaggeration: preset.terrain }); safeAddLayer(targetMap, { id: 'cinematic-hillshade', type: 'hillshade', source: 'mapbox-dem', paint: { 'hillshade-shadow-color': '#11161a', 'hillshade-highlight-color': '#c0c8cc', 'hillshade-accent-color': '#758087', 'hillshade-illumination-direction': 315, 'hillshade-exaggeration': 1.0 } }); targetMap.setFog({ color: 'rgb(28, 32, 36)', 'high-color': 'rgb(86, 92, 98)', 'horizon-blend': .08, 'space-color': 'rgb(5, 7, 9)', 'star-intensity': 0 }); }
        function add3DBuildings(targetMap) { const labelLayer = (targetMap.getStyle().layers || []).find((layer) => layer.type === 'symbol' && layer.layout && layer.layout['text-field']); safeAddLayer(targetMap, { id: '3d-buildings-cinematic', source: 'composite', 'source-layer': 'building', filter: ['==', ['get', 'extrude'], 'true'], type: 'fill-extrusion', minzoom: 14, paint: { 'fill-extrusion-color': ['interpolate', ['linear'], ['zoom'], 14, '#3f2527', 17, '#6d3838'], 'fill-extrusion-height': ['interpolate', ['linear'], ['zoom'], 14, 0, 15.5, ['get', 'height']], 'fill-extrusion-base': ['interpolate', ['linear'], ['zoom'], 14, 0, 15.5, ['get', 'min_height']], 'fill-extrusion-opacity': .82, 'fill-extrusion-vertical-gradient': true } }, labelLayer && labelLayer.id); }
        async function addEnergyRoute(targetMap) { const route = await loadRoute(); state.routeCoords = route.features[0].geometry.coordinates; targetMap.addSource('route128', { type: 'geojson', data: route, lineMetrics: true }); const width = (a, b, c) => ['interpolate', ['linear'], ['zoom'], 8, a, 14, b, 17, c]; const layers = [['route128-reflection', 38, 88, 145, 34, .28], ['route128-glow-outer', 17, 42, 70, 18, .88], ['route128-glow-inner', 9, 24, 40, 6, .98], ['route128-hot-core', 5, 14, 24, 1.6, 1], ['route128-core', 2.6, 7.5, 13, .2, 1]]; for (const [id, w8, w14, w17, blur, opacity] of layers) safeAddLayer(targetMap, { id, type: 'line', source: 'route128', paint: { 'line-width': width(w8, w14, w17), 'line-blur': blur, 'line-opacity': opacity, 'line-gradient': transparentGradient() } }); setRouteReveal(targetMap, 0, .95); }
        async function loadRoute() { status.textContent = `Loading OSM relation ${preset.relationId}...`; const params = new URLSearchParams({ relationId: preset.relationId, routeNumber: preset.routeNumber, start: preset.start.join(','), end: preset.end.join(','), bounds: preset.bounds.join(',') }); const response = await fetch(`/api/osm-route128?${params}`, { cache: 'no-store' }); if (!response.ok) throw new Error(`API ${response.status}`); const route = await response.json(); const feature = normalizeCameraFeature(route); status.textContent = `Route ${preset.routeNumber}: ${route.metadata?.cameraPathKm || '?'} km / relation ${route.metadata?.relationId || preset.relationId}`; return { ...route, features: [feature] }; }
        function normalizeCameraFeature(route) { const feature = route.features?.find((item) => item.properties?.role === 'camera-path') || route.features?.[0]; if (!feature?.geometry?.coordinates?.length) throw new Error('Route has no coordinates'); return feature; }
        function startEnergyFlow(map, offset = 0) { stopEnergyPulse(); const started = performance.now() - offset * 2450; const step = (now) => { const progress = ((now - started) / 2450) % 1; const pulse = .8 + Math.pow(Math.sin((now - started) / 1000 * 6.8), 8) * .2; setCompletedRouteFlow(map, progress, pulse); state.energyFrame = requestAnimationFrame(step); }; state.energyFrame = requestAnimationFrame(step); }
        function stopEnergyPulse() { if (state.energyFrame) cancelAnimationFrame(state.energyFrame); state.energyFrame = null; }
        function setRouteReveal(map, progress, pulse) { setGradient(map, 'route128-reflection', revealGlowGradient(preset.red, (.12 + pulse * .12) * preset.reflectionScale, progress)); setGradient(map, 'route128-glow-outer', revealGlowGradient('#ff0808', (.56 + pulse * .24) * preset.glowScale, progress)); setGradient(map, 'route128-glow-inner', revealGlowGradient('#ff2a16', (.72 + pulse * .2) * preset.glowScale, progress)); setGradient(map, 'route128-hot-core', revealGlowGradient('#ff6a38', (.86 + pulse * .12) * preset.glowScale, progress)); setGradient(map, 'route128-core', revealCoreGradient(progress)); }
        function setCompletedRouteFlow(map, progress, pulse) { setGradient(map, 'route128-reflection', completedFlowGradient(preset.red, (.12 + pulse * .12) * preset.reflectionScale, progress, .075)); setGradient(map, 'route128-glow-outer', completedFlowGradient('#ff0808', (.56 + pulse * .24) * preset.glowScale, progress, .05)); setGradient(map, 'route128-glow-inner', completedFlowGradient('#ff2a16', (.72 + pulse * .2) * preset.glowScale, progress, .038)); setGradient(map, 'route128-hot-core', completedFlowGradient('#ff6a38', (.86 + pulse * .12) * preset.glowScale, progress, .026)); setGradient(map, 'route128-core', completedFlowGradient('#fff0dc', .96, progress, .018)); }
        function revealGlowGradient(color, opacity, progress) { const p = clamp(progress, 0, 1); const hot = hexToRgba(color, opacity); const off = hexToRgba(color, 0); if (p <= 0) return solidGradient(off); if (p >= 1) return solidGradient(hot); const edge = Math.min(1, p + .001); return ['interpolate', ['linear'], ['line-progress'], 0, hot, p, hot, edge, off, 1, off]; }
        function revealCoreGradient(progress) { const p = clamp(progress, 0, 1); const lit = 'rgba(255, 240, 220, .98)'; const guide = `rgba(154, 163, 168, ${preset.guideOpacity})`; if (p <= 0) return solidGradient(guide); if (p >= 1) return solidGradient(lit); const edge = Math.min(1, p + .001); return ['interpolate', ['linear'], ['line-progress'], 0, lit, p, lit, edge, guide, 1, guide]; }
        function completedFlowGradient(color, opacity, progress, width) { const p = clamp(progress, 0, 1); const start = clamp(p - width, 0, 1); const end = clamp(p + width, 0, 1); const base = hexToRgba(color, opacity * .62); const hot = hexToRgba(color, opacity); return ['interpolate', ['linear'], ['line-progress'], 0, base, start, base, p, hot, end, base, 1, base]; }
        function loadDirectorPreset(defaults) { const params = new URLSearchParams(location.search); let saved = {}; try { saved = JSON.parse(localStorage.getItem('routeDirectorPreset') || '{}'); } catch (error) {} const fromQuery = Object.fromEntries(params.entries()); const merged = { ...defaults, ...saved, ...fromQuery }; return normalizePreset(merged, defaults); }
        function normalizePreset(value, defaults) { const coord = (key) => Array.isArray(value[key]) ? value[key] : parseCoord(value[key], defaults[key]); const number = (key) => finiteNumber(value[key], defaults[key]); return { ...defaults, ...value, relationId: String(value.relationId || defaults.relationId), routeNumber: String(value.routeNumber || defaults.routeNumber), title: String(value.title || defaults.title), kicker: String(value.kicker || defaults.kicker), start: coord('start'), end: coord('end'), bounds: Array.isArray(value.bounds) ? value.bounds : parseBounds(value.bounds, defaults.bounds), mapCenter: coord('mapCenter'), outroCenter: coord('outroCenter'), introZoom: number('introZoom'), followZoom: number('followZoom'), outroZoom: number('outroZoom'), pitch: number('pitch'), terrain: number('terrain'), followDuration: clamp(number('followDuration'), 5000, 60000), outroDuration: number('outroDuration'), glowScale: number('glowScale'), reflectionScale: number('reflectionScale'), guideOpacity: number('guideOpacity'), red: String(value.red || defaults.red), prewarmDuration: clamp(number('prewarmDuration'), 0, 12000), adaptiveTilePace: number('adaptiveTilePace') }; }
        function buildPath(coords) { const segments = []; let total = 0; for (let i = 0; i < coords.length - 1; i++) { const a = coords[i]; const b = coords[i + 1]; const length = distance(a, b); segments.push({ a, b, start: total, end: total + length, length }); total += length; } return { segments, total }; }
        function pointAt(path, progress) { const target = path.total * clamp(progress, 0, 1); const segment = path.segments.find((item) => target <= item.end) || path.segments[path.segments.length - 1]; const local = segment.length ? (target - segment.start) / segment.length : 0; return { coord: [lerp(segment.a[0], segment.b[0], local), lerp(segment.a[1], segment.b[1], local)] }; }
        function distance(a, b) { const x = (b[0] - a[0]) * Math.cos(((a[1] + b[1]) / 2) * Math.PI / 180); const y = b[1] - a[1]; return Math.sqrt(x * x + y * y); }
        function bearingBetween(a, b) { const y = Math.sin((b[0] - a[0]) * Math.PI / 180) * Math.cos(b[1] * Math.PI / 180); const x = Math.cos(a[1] * Math.PI / 180) * Math.sin(b[1] * Math.PI / 180) - Math.sin(a[1] * Math.PI / 180) * Math.cos(b[1] * Math.PI / 180) * Math.cos((b[0] - a[0]) * Math.PI / 180); return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360; }
        function smoothBearing(current, target, amount) { const delta = ((((target - current) % 360) + 540) % 360) - 180; return (current + delta * amount + 360) % 360; }
        function safeTilesLoaded(map) { try { return map.loaded() && map.areTilesLoaded(); } catch (error) { return true; } }
        function waitForIdleOrTimeout(map, timeout) { return safeTilesLoaded(map) ? Promise.resolve() : onceOrTimeout(map, 'idle', timeout); }
        function onceOrTimeout(map, eventName, timeout) { return Promise.race([once(map, eventName), wait(timeout)]); }
        function safeAddLayer(map, layer, before) { try { if (!map.getLayer(layer.id)) map.addLayer(layer, before); } catch (error) {} }
        function transparentGradient() { return solidGradient('rgba(255,0,0,0)'); }
        function solidGradient(color) { return ['interpolate', ['linear'], ['line-progress'], 0, color, 1, color]; }
        function setGradient(map, layerId, gradient) { if (map.getLayer(layerId)) map.setPaintProperty(layerId, 'line-gradient', gradient); }
        function hexToRgba(hex, alpha) { const value = String(hex).replace('#', '').padEnd(6, '0'); const r = parseInt(value.slice(0, 2), 16); const g = parseInt(value.slice(2, 4), 16); const b = parseInt(value.slice(4, 6), 16); return `rgba(${r}, ${g}, ${b}, ${clamp(alpha, 0, 1)})`; }
        function hideModernPoiLabels(targetMap) { const hidden = [/poi-label/, /transit-label/, /airport-label/, /settlement-subdivision-label/, /building-number-label/]; for (const layer of targetMap.getStyle().layers || []) { if (layer.type === 'symbol' && hidden.some((pattern) => pattern.test(layer.id))) targetMap.setLayoutProperty(layer.id, 'visibility', 'none'); } }
        async function loadRemoteConfig() { try { const response = await fetch('/api/config', { cache: 'no-store' }); return response.ok ? response.json() : {}; } catch (error) { return {}; } }
        async function loadStoryline(config) { if (config.supabaseUrl && config.supabaseAnonKey) { try { const endpoint = `${config.supabaseUrl}/rest/v1/scenes?select=*&order=sort_order.asc`; const response = await fetch(endpoint, { headers: { apikey: config.supabaseAnonKey, authorization: `Bearer ${config.supabaseAnonKey}` } }); const rows = response.ok ? await response.json() : []; if (rows.length) return { scenes: rows.map((row) => ({ id: row.id, title: row.title, lngLat: row.lng_lat, zoom: row.zoom, pitch: row.pitch, bearing: row.bearing, duration: row.duration, overlayImage: row.overlay_image, overlayCoords: row.overlay_coords, highlightRouteId: row.highlight_route_id })) }; } catch (error) { console.warn(error); } } const fallback = await fetch('./storyline.json'); return fallback.json(); }
        function cleanMapboxToken(value) { const text = String(value || '').replace(/\\n/g, '').replace(/[\r\n\t]/g, '').trim().replace(/^['"]|['"]$/g, ''); const match = text.match(/pk\.[A-Za-z0-9._-]+/); return match ? match[0] : text; }
        function isValidMapboxToken(value) { return /^pk\.[A-Za-z0-9._-]+$/.test(value); }
        function parseCoord(value, fallback) { const parts = String(value || '').split(',').map((part) => Number(part.trim())); return parts.length === 2 && parts.every(Number.isFinite) ? parts : fallback; }
        function parseBounds(value, fallback) { const parts = String(value || '').split(',').map((part) => Number(part.trim())); return parts.length === 4 && parts.every(Number.isFinite) ? parts : fallback; }
        function finiteNumber(value, fallback) { const number = Number(value); return Number.isFinite(number) ? number : fallback; }
        function once(targetMap, eventName) { return new Promise((resolve) => targetMap.once(eventName, resolve)); }
        function wait(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
        function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
        function lerp(a, b, t) { return a + (b - a) * t; }
        function easeInOutCubic(t) { return t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
        function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }
      }());
