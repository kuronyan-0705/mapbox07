<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Route 128 3D Energy Director</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css" rel="stylesheet">
    <style>
      html, body, #map { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #171b1f; }
      .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib, .mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none !important; }
      #black-grade { position: fixed; inset: 0; pointer-events: none; background: linear-gradient(rgba(0,0,0,.01), rgba(0,0,0,.03)); mix-blend-mode: multiply; }
      #vignette { position: fixed; inset: 0; pointer-events: none; background: radial-gradient(circle at 50% 45%, rgba(0,0,0,0) 0, rgba(0,0,0,.03) 52%, rgba(0,0,0,.28) 100%); }
      #title-card { position: fixed; left: clamp(28px, 5vw, 72px); bottom: clamp(28px, 7vh, 86px); max-width: min(780px, calc(100vw - 56px)); opacity: 0; transform: translateY(16px); transition: opacity 900ms ease, transform 900ms ease; pointer-events: none; text-shadow: 0 4px 30px rgba(255, 28, 20, .72), 0 3px 20px rgba(0,0,0,.95); }
      #title-card.visible { opacity: 1; transform: translateY(0); }
      #scene-kicker { margin: 0 0 10px; color: #ff9b88; font: 700 clamp(12px, 1.15vw, 17px)/1.45 system-ui, sans-serif; letter-spacing: 0; }
      #scene-title { margin: 0; color: #fff1ec; font: 800 clamp(30px, 4.5vw, 72px)/1.12 "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif; letter-spacing: 0; }
      #status { position: fixed; right: 18px; top: 16px; max-width: min(390px, calc(100vw - 36px)); padding: 8px 10px; border: 1px solid rgba(255, 66, 44, .34); background: rgba(0, 0, 0, .5); color: #ffe7df; font: 12px/1.5 system-ui, sans-serif; pointer-events: none; box-shadow: 0 0 22px rgba(255, 24, 24, .18); }
      body.ready #status { opacity: .36; }
    </style>
  </head>
  <body>
    <main id="map"></main>
    <div id="black-grade"></div>
    <div id="vignette"></div>
    <section id="title-card" aria-live="polite">
      <p id="scene-kicker">Route 128 / 3D Terrain</p>
      <h1 id="scene-title">地形に走る赤い痕跡</h1>
    </section>
    <div id="status">Mapbox token required</div>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.js"></script>
    <script>
      (async function boot() {
        const config = await loadRemoteConfig();
        const token = (window.MAPBOX_TOKEN || config.mapboxToken || new URLSearchParams(location.search).get('token') || '').trim();
        const titleCard = document.getElementById('title-card');
        const sceneTitle = document.getElementById('scene-title');
        const status = document.getElementById('status');
        const state = { storyline: null, sceneIndex: -1, autoplayTimer: null, energyFrame: null, revealStart: 0 };

        if (!token) status.textContent = 'Set MAPBOX_TOKEN in Vercel';
        mapboxgl.accessToken = token;

        const map = new mapboxgl.Map({
          container: 'map',
          style: 'mapbox://styles/mapbox/dark-v11',
          center: [140.22, 35.31],
          zoom: 8.65,
          pitch: 0,
          bearing: 0,
          antialias: true,
          attributionControl: false,
          logoPosition: 'bottom-left'
        });

        map.dragRotate.disable();
        map.touchZoomRotate.disableRotation();

        await once(map, 'load');
        tuneMapForReadableTerrain(map);
        add3DTerrainAndRelief(map);
        add3DBuildings(map);
        hideModernPoiLabels(map);
        await addEnergyRoute(map);
        state.storyline = await loadStoryline(config);
        document.body.classList.add('ready');
        status.textContent = 'Intro: flat map to 3D / Space: next scene / R: autoplay';
        await waitForIdle(map);
        playIntro();

        window.addEventListener('keydown', (event) => {
          if (event.code === 'Space') { event.preventDefault(); goToScene(state.sceneIndex + 1); }
          if (event.key.toLowerCase() === 'r') { event.preventDefault(); startAutopilot(); }
        });

        async function playIntro() {
          const first = state.storyline.scenes[0];
          state.sceneIndex = 0;
          sceneTitle.textContent = first.title;
          map.jumpTo({ center: [140.18, 35.30], zoom: 8.75, pitch: 0, bearing: 0 });
          resetReveal();
          runEnergyPulse();
          await wait(900);
          map.easeTo({ center: first.lngLat, zoom: 12.45, pitch: 73, bearing: 32, duration: 9000, easing: easeInOutCubic, essential: true });
          await once(map, 'moveend');
          titleCard.classList.add('visible');
        }

        async function goToScene(nextIndex, options = {}) {
          const scenes = state.storyline.scenes;
          const index = ((nextIndex % scenes.length) + scenes.length) % scenes.length;
          const scene = scenes[index];
          state.sceneIndex = index;
          sceneTitle.textContent = scene.title;
          status.textContent = `${index + 1}/${scenes.length}: ${scene.title}`;
          titleCard.classList.remove('visible');
          resetReveal();
          runEnergyPulse();

          map.flyTo({
            center: scene.lngLat,
            zoom: Math.max(scene.zoom, 12.4),
            pitch: Math.max(scene.pitch || 73, 73),
            bearing: scene.bearing + 14,
            duration: options.instant ? 0 : scene.duration,
            curve: 1.42,
            speed: .48,
            essential: true
          });

          await once(map, 'moveend');
          await waitForIdle(map);
          titleCard.classList.add('visible');
        }

        function tuneMapForReadableTerrain(targetMap) {
          const layers = targetMap.getStyle().layers || [];
          for (const layer of layers) {
            if (layer.type === 'background') targetMap.setPaintProperty(layer.id, 'background-color', '#171b1f');
            if (layer.type === 'fill') {
              targetMap.setPaintProperty(layer.id, 'fill-color', '#3e464c');
              targetMap.setPaintProperty(layer.id, 'fill-opacity', .98);
            }
            if (layer.type === 'line') {
              targetMap.setPaintProperty(layer.id, 'line-color', '#6b747a');
              targetMap.setPaintProperty(layer.id, 'line-opacity', .68);
            }
            if (layer.type === 'symbol') {
              targetMap.setPaintProperty(layer.id, 'text-color', '#b4bdc4');
              targetMap.setPaintProperty(layer.id, 'text-halo-color', '#1b2024');
              targetMap.setPaintProperty(layer.id, 'text-halo-width', .8);
              targetMap.setPaintProperty(layer.id, 'text-opacity', .78);
              targetMap.setPaintProperty(layer.id, 'icon-opacity', .42);
            }
          }
        }

        function add3DTerrainAndRelief(targetMap) {
          targetMap.addSource('mapbox-dem', { type: 'raster-dem', url: 'mapbox://mapbox.mapbox-terrain-dem-v1', tileSize: 512, maxzoom: 14 });
          targetMap.setTerrain({ source: 'mapbox-dem', exaggeration: 2.15 });
          targetMap.addLayer({
            id: 'cinematic-hillshade',
            type: 'hillshade',
            source: 'mapbox-dem',
            paint: {
              'hillshade-shadow-color': '#11161a',
              'hillshade-highlight-color': '#b2bbc0',
              'hillshade-accent-color': '#69737a',
              'hillshade-illumination-direction': 315,
              'hillshade-exaggeration': 1.08
            }
          });
          targetMap.setFog({ color: 'rgb(22, 25, 28)', 'high-color': 'rgb(78, 84, 90)', 'horizon-blend': .07, 'space-color': 'rgb(4, 5, 7)', 'star-intensity': 0 });
        }

        function add3DBuildings(targetMap) {
          const labelLayer = (targetMap.getStyle().layers || []).find((layer) => layer.type === 'symbol' && layer.layout && layer.layout['text-field']);
          targetMap.addLayer({
            id: '3d-buildings-cinematic',
            source: 'composite',
            'source-layer': 'building',
            filter: ['==', ['get', 'extrude'], 'true'],
            type: 'fill-extrusion',
            minzoom: 14,
            paint: {
              'fill-extrusion-color': ['interpolate', ['linear'], ['zoom'], 14, '#2a3035', 17, '#46515a'],
              'fill-extrusion-height': ['interpolate', ['linear'], ['zoom'], 14, 0, 15.5, ['get', 'height']],
              'fill-extrusion-base': ['interpolate', ['linear'], ['zoom'], 14, 0, 15.5, ['get', 'min_height']],
              'fill-extrusion-opacity': .78,
              'fill-extrusion-vertical-gradient': true
            }
          }, labelLayer && labelLayer.id);
        }

        async function addEnergyRoute(targetMap) {
          targetMap.addSource('route128', { type: 'geojson', data: './route128.geojson', lineMetrics: true });
          const width = (a, b, c) => ['interpolate', ['linear'], ['zoom'], 8, a, 14, b, 17, c];
          const layers = [
            ['route128-terrain-reflection', 98, 185, 260, 48, .58],
            ['route128-blood-haze', 42, 92, 142, 44, .86],
            ['route128-shadow', 30, 68, 108, 34, .9],
            ['route128-glow-outer', 20, 48, 78, 24, .96],
            ['route128-glow-inner', 10, 28, 46, 11, .98],
            ['route128-hot-core', 5, 14, 24, 3, .98],
            ['route128-core', 2.3, 7, 12, .45, 1]
          ];
          for (const [id, w8, w14, w17, blur, opacity] of layers) {
            targetMap.addLayer({ id, type: 'line', source: 'route128', paint: { 'line-width': width(w8, w14, w17), 'line-blur': blur, 'line-opacity': opacity, 'line-gradient': transparentGradient() } });
          }
          targetMap.addLayer({ id: 'route128-scan-wide', type: 'line', source: 'route128', paint: { 'line-width': width(22, 54, 86), 'line-blur': 20, 'line-opacity': 1, 'line-gradient': transparentGradient() } });
          targetMap.addLayer({ id: 'route128-scan', type: 'line', source: 'route128', paint: { 'line-width': width(10, 26, 42), 'line-blur': 5, 'line-opacity': 1, 'line-gradient': transparentGradient() } });
        }

        function resetReveal() {
          state.revealStart = performance.now();
          setReveal(0, 0);
        }

        function runEnergyPulse() {
          if (state.energyFrame) cancelAnimationFrame(state.energyFrame);
          const step = (now) => {
            const elapsed = now - state.revealStart;
            const reveal = Math.min(1, elapsed / 7600);
            const pulse = .72 + Math.pow(Math.sin(elapsed / 1000 * 6.2), 8) * .28;
            setReveal(reveal, pulse);
            state.energyFrame = requestAnimationFrame(step);
          };
          state.energyFrame = requestAnimationFrame(step);
        }

        function setReveal(progress, pulse) {
          const p = clamp(progress, 0, 1);
          const bodyEnd = Math.max(0, p - .02);
          const headStart = Math.max(0, p - .08);
          const headEnd = Math.min(1, p + .035);
          setGradient('route128-terrain-reflection', gradientFor('#ff1208', .24 + pulse * .18, p, .22));
          setGradient('route128-blood-haze', gradientFor('#780000', .44 + pulse * .22, p, .16));
          setGradient('route128-shadow', gradientFor('#b80000', .5 + pulse * .24, p, .14));
          setGradient('route128-glow-outer', gradientFor('#ff0808', .62 + pulse * .28, p, .11));
          setGradient('route128-glow-inner', gradientFor('#ff2a16', .72 + pulse * .24, p, .08));
          setGradient('route128-hot-core', gradientFor('#ff6a38', .82 + pulse * .18, p, .05));
          setGradient('route128-core', gradientFor('#fff0dc', .92, p, .025));
          setGradient('route128-scan-wide', [
            'interpolate', ['linear'], ['line-progress'],
            0, 'rgba(255, 12, 8, 0)',
            Math.max(0, bodyEnd - .2), 'rgba(255, 12, 8, 0)',
            headStart, 'rgba(255, 0, 0, .4)',
            p, 'rgba(255, 240, 210, 1)',
            headEnd, 'rgba(255, 30, 12, .18)',
            1, 'rgba(255, 18, 12, 0)'
          ]);
          setGradient('route128-scan', [
            'interpolate', ['linear'], ['line-progress'],
            0, 'rgba(255, 18, 12, 0)',
            Math.max(0, bodyEnd - .1), 'rgba(255, 20, 14, 0)',
            headStart, 'rgba(255, 58, 26, .85)',
            p, 'rgba(255, 255, 236, 1)',
            headEnd, 'rgba(255, 46, 24, .34)',
            1, 'rgba(255, 18, 12, 0)'
          ]);
        }

        function gradientFor(color, opacity, progress, softness) {
          const rgba = hexToRgba(color, opacity);
          const dim = hexToRgba(color, opacity * .45);
          const p = clamp(progress, 0, 1);
          return [
            'interpolate', ['linear'], ['line-progress'],
            0, rgba,
            Math.max(0, p - softness), dim,
            p, rgba,
            Math.min(1, p + .002), 'rgba(255, 0, 0, 0)',
            1, 'rgba(255, 0, 0, 0)'
          ];
        }

        function transparentGradient() {
          return ['interpolate', ['linear'], ['line-progress'], 0, 'rgba(255,0,0,0)', 1, 'rgba(255,0,0,0)'];
        }

        function setGradient(layerId, gradient) {
          if (map.getLayer(layerId)) map.setPaintProperty(layerId, 'line-gradient', gradient);
        }

        function hexToRgba(hex, alpha) {
          const value = hex.replace('#', '');
          const r = parseInt(value.slice(0, 2), 16);
          const g = parseInt(value.slice(2, 4), 16);
          const b = parseInt(value.slice(4, 6), 16);
          return `rgba(${r}, ${g}, ${b}, ${clamp(alpha, 0, 1)})`;
        }

        function startAutopilot() {
          if (state.autoplayTimer) clearTimeout(state.autoplayTimer);
          goToScene(0, { instant: state.sceneIndex === -1 });
          let next = 1;
          const schedule = () => {
            const current = state.storyline.scenes[state.sceneIndex];
            state.autoplayTimer = setTimeout(async () => {
              await goToScene(next);
              next = (next + 1) % state.storyline.scenes.length;
              schedule();
            }, Math.max(2800, current.duration + 1800));
          };
          schedule();
        }

        function hideModernPoiLabels(targetMap) {
          const hidden = [/poi-label/, /transit-label/, /airport-label/, /settlement-subdivision-label/, /building-number-label/];
          for (const layer of targetMap.getStyle().layers || []) {
            if (layer.type === 'symbol' && hidden.some((pattern) => pattern.test(layer.id))) targetMap.setLayoutProperty(layer.id, 'visibility', 'none');
          }
        }

        async function loadRemoteConfig() {
          try { const response = await fetch('/api/config', { cache: 'no-store' }); return response.ok ? response.json() : {}; }
          catch (error) { return {}; }
        }

        async function loadStoryline(config) {
          if (config.supabaseUrl && config.supabaseAnonKey) {
            try {
              const endpoint = `${config.supabaseUrl}/rest/v1/scenes?select=*&order=sort_order.asc`;
              const response = await fetch(endpoint, { headers: { apikey: config.supabaseAnonKey, authorization: `Bearer ${config.supabaseAnonKey}` } });
              const rows = response.ok ? await response.json() : [];
              if (rows.length) return { scenes: rows.map((row) => ({ id: row.id, title: row.title, lngLat: row.lng_lat, zoom: row.zoom, pitch: row.pitch, bearing: row.bearing, duration: row.duration, overlayImage: row.overlay_image, overlayCoords: row.overlay_coords, highlightRouteId: row.highlight_route_id })) };
            } catch (error) { console.warn(error); }
          }
          const fallback = await fetch('./storyline.json');
          return fallback.json();
        }

        function waitForIdle(targetMap) { return targetMap.loaded() && targetMap.areTilesLoaded() ? Promise.resolve() : once(targetMap, 'idle'); }
        function once(targetMap, eventName) { return new Promise((resolve) => targetMap.once(eventName, resolve)); }
        function wait(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
        function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
        function easeInOutCubic(t) { return t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
      }());
    </script>
  </body>
</html>
