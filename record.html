<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>録画モード</title>
    <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
      iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; background: #000; opacity: 0; transition: opacity 600ms ease; }
      body.started iframe { opacity: 1; }
      #cover { position: fixed; inset: 0; display: grid; place-items: center; background: #000; color: #f6ded8; font: 700 clamp(16px, 2.4vw, 28px)/1.5 system-ui, "Yu Gothic", Meiryo, sans-serif; letter-spacing: 0; z-index: 2; transition: opacity 500ms ease; }
      body.started #cover { opacity: 0; pointer-events: none; }
      #panel { min-width: min(520px, calc(100vw - 40px)); padding: 24px; border: 1px solid rgba(255, 62, 38, .42); background: rgba(8, 10, 12, .92); box-shadow: 0 0 48px rgba(255, 32, 20, .22); text-align: center; }
      #count { display: block; margin-top: 10px; font-size: clamp(38px, 8vw, 90px); line-height: 1; color: #fff4ef; text-shadow: 0 0 34px rgba(255, 34, 20, .7); }
    </style>
  </head>
  <body>
    <iframe id="stage" src="./energy-3d.html?record=1" allow="fullscreen"></iframe>
    <div id="cover"><div id="panel">録画モード準備中<span id="count">5</span></div></div>
    <script>
      const stage = document.getElementById('stage');
      const count = document.getElementById('count');
      let loaded = false;
      let seconds = 5;

      stage.addEventListener('load', () => {
        loaded = true;
        hideRecordingUi();
      });

      const timer = setInterval(() => {
        seconds -= 1;
        count.textContent = Math.max(0, seconds);
        hideRecordingUi();
        if (seconds <= 0 && loaded) startRecordingPlayback();
      }, 1000);

      function hideRecordingUi() {
        try {
          const doc = stage.contentDocument;
          if (!doc) return;
          const status = doc.getElementById('status');
          if (status) status.style.display = 'none';
          doc.body.style.cursor = 'none';
        } catch (error) {}
      }

      function startRecordingPlayback() {
        clearInterval(timer);
        hideRecordingUi();
        document.body.classList.add('started');
        setTimeout(() => {
          try {
            stage.contentWindow.dispatchEvent(new KeyboardEvent('keydown', { key: 'r', code: 'KeyR', bubbles: true }));
          } catch (error) {}
        }, 650);
      }
    </script>
  </body>
</html>
