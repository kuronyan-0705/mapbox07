<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>地点ズーム演出 管理画面</title>
    <style>
      :root { color-scheme: dark; --panel: #182126; --line: #314047; --text: #f2f5f4; --muted: #a9b6b6; }
      * { box-sizing: border-box; }
      body { margin: 0; background: radial-gradient(circle at 18% 0%, #25323a 0, #10161a 42%, #090d10 100%); color: var(--text); font: 14px/1.6 system-ui, -apple-system, BlinkMacSystemFont, "Yu Gothic", Meiryo, sans-serif; }
      main { width: min(1080px, calc(100vw - 32px)); margin: 0 auto; padding: 28px 0 40px; }
      header { display: flex; justify-content: space-between; gap: 16px; align-items: end; margin-bottom: 20px; }
      h1 { margin: 0; font-size: clamp(24px, 3vw, 40px); line-height: 1.2; letter-spacing: 0; }
      p { margin: 6px 0 0; color: var(--muted); }
      .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px; }
      section { grid-column: span 6; background: rgba(24, 33, 38, .92); border: 1px solid var(--line); border-radius: 8px; padding: 18px; box-shadow: 0 20px 60px rgba(0,0,0,.28); }
      .wide { grid-column: 1 / -1; }
      h2 { margin: 0 0 14px; font-size: 16px; }
      label { display: grid; gap: 6px; margin: 0 0 12px; color: #dce4e2; font-weight: 700; }
      input, textarea { width: 100%; min-height: 40px; border: 1px solid #405158; border-radius: 6px; background: #0d1417; color: var(--text); padding: 8px 10px; font: inherit; }
      textarea { min-height: 88px; resize: vertical; }
      input[type="color"] { padding: 3px; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
      button, a.button { appearance: none; border: 1px solid #5a2b25; border-radius: 6px; background: linear-gradient(180deg, #ff4a2e, #be281c); color: white; min-height: 42px; padding: 9px 14px; font: 800 14px/1 system-ui, sans-serif; text-decoration: none; cursor: pointer; }
      button.secondary, a.secondary { background: #121a1f; border-color: #405158; color: #dce4e2; }
      button.capture { background: linear-gradient(180deg, #7ee3ff, #2477c4); border-color: #23628f; color: #03111c; }
      #message { color: #ffd9cf; min-height: 24px; }
      pre { margin: 0; padding: 14px; max-height: 360px; overflow: auto; border: 1px solid #34454c; border-radius: 6px; background: #0b1114; color: #cfe4e4; white-space: pre-wrap; }
      @media (max-width: 760px) { section { grid-column: 1 / -1; } header { display: block; } .row, .triple { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>地点ズーム演出 管理画面</h1>
          <p>日本地図の時点から指定地点を中心に固定し、地表までズームして旋回します。</p>
        </div>
        <div class="actions">
          <a class="button secondary" href="./admin.html">国道管理へ</a>
          <a class="button secondary" href="./point-zoom.html" target="_blank" rel="noreferrer">地点映像を開く</a>
        </div>
      </header>

      <form id="form" class="grid">
        <section>
          <h2>地点</h2>
          <label>地点名<input name="pointTitle" value="一宮城跡"></label>
          <label>小見出し<input name="pointKicker" value="Point / Center zoom"></label>
          <label>中心座標 lng,lat<input name="pointLngLat" value="140.3642,35.3741"></label>
          <label>マーカー色<input name="markerColor" type="color" value="#ff1208"></label>
        </section>

        <section>
          <h2>カメラ</h2>
          <div class="row"><label>開始ズーム<input name="startZoom" type="number" step="0.05" value="4.75"></label><label>地表ズーム<input name="groundZoom" type="number" step="0.05" value="16.65"></label></div>
          <div class="row"><label>ピッチ<input name="pitch" type="number" step="1" value="67"></label><label>地形立体感<input name="terrain" type="number" step="0.05" value="2.1"></label></div>
          <div class="row"><label>接近時間 ms<input name="approachDuration" type="number" step="100" value="9000"></label><label>旋回時間 ms<input name="orbitDuration" type="number" step="100" value="9200"></label></div>
          <label>旋回回数<input name="orbitTurns" type="number" step="0.05" value="1.05"></label>
        </section>

        <section class="wide">
          <h2>周辺施設</h2>
          <p>表示したい施設名と座標を入れます。空欄にすると非表示になります。</p>
          <div class="triple">
            <label>施設1 名称<input name="facility1Name" value="一宮小"></label>
            <label>施設1 種別<input name="facility1Type" value="school"></label>
            <label>施設1 座標 lng,lat<input name="facility1Coord" value="140.361564,35.37359"></label>
          </div>
          <div class="triple">
            <label>施設2 名称<input name="facility2Name" value="玉前神社"></label>
            <label>施設2 種別<input name="facility2Type" value="shrine"></label>
            <label>施設2 座標 lng,lat<input name="facility2Coord" value="140.360626,35.376228"></label>
          </div>
          <div class="triple">
            <label>施設3 名称<input name="facility3Name" value="釣ヶ崎海岸"></label>
            <label>施設3 種別<input name="facility3Type" value="coast"></label>
            <label>施設3 座標 lng,lat<input name="facility3Coord" value="140.389444,35.336944"></label>
          </div>
        </section>

        <section class="wide">
          <h2>古地図・断層図オーバーレイ</h2>
          <label>画像URL<input name="overlayImage" placeholder="https://.../old-map.png"></label>
          <label>四隅座標 JSON<textarea name="overlayCoords" placeholder='[[西上lng,北上lat],[東上lng,北上lat],[東下lng,南下lat],[西下lng,南下lat]]'></textarea></label>
          <label>透明度 0〜1<input name="overlayOpacity" type="number" step="0.05" min="0" max="1" value="0.72"></label>
        </section>

        <section class="wide">
          <div class="actions">
            <button type="button" id="save">保存</button>
            <button type="button" id="preview">保存してプレビュー</button>
            <button type="button" id="record" class="capture">保存して録画用表示</button>
            <button type="button" id="reset" class="secondary">初期値に戻す</button>
          </div>
          <p id="message"></p>
        </section>

        <section class="wide"><h2>現在の設定</h2><pre id="output"></pre></section>
      </form>
    </main>

    <script>
      const STORAGE_KEY = 'pointDirectorPreset';
      const form = document.getElementById('form');
      const output = document.getElementById('output');
      const message = document.getElementById('message');
      const defaults = readForm();
      loadSaved(); render();
      form.addEventListener('input', render);
      document.getElementById('save').addEventListener('click', () => { save(); message.textContent = '保存しました。point-zoom.htmlを開くとこの設定で再生されます。'; });
      document.getElementById('preview').addEventListener('click', () => { save(); window.open('./point-zoom.html', '_blank', 'noreferrer'); });
      document.getElementById('record').addEventListener('click', () => { save(); window.open('./point-zoom.html?record=1', '_blank', 'noreferrer'); });
      document.getElementById('reset').addEventListener('click', () => { localStorage.removeItem(STORAGE_KEY); writeForm(defaults); save(); message.textContent = '初期値に戻しました。'; });

      function save() { const preset = readForm(); localStorage.setItem(STORAGE_KEY, JSON.stringify(preset)); render(); }
      function loadSaved() { try { const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); if (Object.keys(saved).length) writeForm(saved); } catch (error) {} }
      function render() { output.textContent = JSON.stringify(readForm(), null, 2); }
      function readForm() {
        const data = new FormData(form);
        const get = (name) => String(data.get(name) || '').trim();
        const num = (name) => Number(get(name));
        return {
          pointTitle: get('pointTitle'), pointKicker: get('pointKicker'), pointLngLat: coord(get('pointLngLat')),
          markerColor: get('markerColor'), startZoom: num('startZoom'), groundZoom: num('groundZoom'), pitch: num('pitch'), terrain: num('terrain'),
          orbitTurns: num('orbitTurns'), approachDuration: num('approachDuration'), orbitDuration: num('orbitDuration'),
          facilities: readFacilities(get), overlayImage: get('overlayImage'), overlayCoords: parseJson(get('overlayCoords')), overlayOpacity: num('overlayOpacity')
        };
      }
      function readFacilities(get) {
        return [1, 2, 3].map((index) => ({ name: get(`facility${index}Name`), type: get(`facility${index}Type`), coordinates: coord(get(`facility${index}Coord`)) })).filter((item) => item.name && item.coordinates);
      }
      function writeForm(values) {
        for (const [key, value] of Object.entries(values)) {
          if (key === 'facilities') { writeFacilities(value); continue; }
          const field = form.elements[key];
          if (!field) continue;
          field.value = key === 'overlayCoords' && Array.isArray(value) ? JSON.stringify(value) : Array.isArray(value) ? value.join(',') : (value ?? '');
        }
        render();
      }
      function writeFacilities(items) {
        const list = Array.isArray(items) ? items : [];
        [1, 2, 3].forEach((index) => {
          const item = list[index - 1] || {};
          form.elements[`facility${index}Name`].value = item.name || '';
          form.elements[`facility${index}Type`].value = item.type || '';
          form.elements[`facility${index}Coord`].value = Array.isArray(item.coordinates) ? item.coordinates.join(',') : '';
        });
      }
      function coord(value) { const parts = String(value || '').split(',').map((item) => Number(item.trim())); return parts.length === 2 && parts.every(Number.isFinite) ? parts : null; }
      function parseJson(value) { if (!value) return null; try { return JSON.parse(value); } catch (error) { return null; } }
    </script>
  </body>
</html>
